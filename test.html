<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>부품 선택 → 쉼표 데이터 생성기 (일련번호/그룹태그/안정화/최적화)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 색상 스타일 적용을 위해 xlsx-js-style 라이브러리 사용 -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
  <style>
    /* 브라우저별 정규화 */
    * {
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }
    
    input, textarea {
      -webkit-user-select: text;
      -moz-user-select: text;
      -ms-user-select: text;
      user-select: text;
    }

    /* 기본 스크롤바 스타일 */
    .custom-scroll::-webkit-scrollbar { height: 8px; width: 8px; }
    .custom-scroll::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 9999px; }
    .custom-scroll::-webkit-scrollbar-track { background: #18181b; }
    
    .panel { border: 1px solid #262626; border-radius: 16px; background: #0b0b0c; }
    .btn { border-radius: 12px; padding: 8px 12px; }
    .seg { border-radius: 9999px; overflow: hidden; border: 1px solid #3f3f46; }
    .seg > button { padding: 6px 12px; }
    .seg .active { background: #6366f1; }
    
    .copy-success {
      background-color: #10b981 !important;
      transition: all 0.3s ease;
    }
    
    .highlight {
      background-color: #fbbf24;
      color: #000;
      font-weight: bold;
      border-radius: 2px;
      padding: 0 2px;
    }
    
    .tag-btn {
      transition: all 0.2s ease;
    }
    .tag-btn.active {
      background-color: #10b981 !important;
      border-color: #059669 !important;
      color: white;
    }

    .virtual-list {
      transform: translateZ(0);
      contain: layout style paint;
    }
    
    .part-item {
      contain: layout;
      touch-action: manipulation;
      padding: 0.75rem 1rem;
      border-radius: 0.75rem;
      background: #0a0a0b;
      border: 1px solid #262626;
      margin-bottom: 0.375rem;
      transition: all 0.15s ease;
    }
    
    .part-item:active {
      transform: scale(0.98);
      background: #111111;
    }
    
    .part-item.selected {
      border-color: #6366f1;
      background: rgba(99, 102, 241, 0.05);
      box-shadow: 0 0 0 1px rgba(99, 102, 241, 0.2);
    }
    
    .part-main {
      display: flex;
      align-items: flex-start;
      gap: 0.625rem;
      margin-bottom: 0.375rem;
    }
    
    .part-checkbox {
      flex-shrink: 0;
      width: 1.25rem;
      height: 1.25rem;
      margin-top: 0.125rem;
      accent-color: #6366f1;
    }
    
    .part-info {
      flex: 1;
      min-width: 0;
    }
    
    .part-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.25rem;
      margin-bottom: 0.125rem;
    }
    
    .part-tag {
      font-size: 0.8125rem; 
      font-weight: 700;     
      padding: 0.15rem 0.4rem;
      border-radius: 0.25rem;
      background: #374151;
      color: #f3f4f6;       
      border: 1px solid #4b5563;
      white-space: nowrap;
    }
    
    .part-name {
      font-size: 1.125rem;
      font-weight: 700;
      line-height: 1.3;
      color: #f9fafb;
      word-break: break-word;
    }
    
    .part-controls {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 0.5rem;
    }
    
    .quantity-label {
      font-size: 0.8125rem;
      color: #9ca3af;
      flex-shrink: 0;
    }
    
    .quantity-section {
      display: flex;
      align-items: center;
      gap: 0.375rem;
    }
    
    .quantity-input {
      width: 3rem;
      height: 2rem;
      border-radius: 0.5rem;
      border: 1px solid #374151;
      background: #1f2937;
      color: #f9fafb;
      text-align: center;
      font-size: 0.875rem;
      -webkit-appearance: none;
      -moz-appearance: textfield;
    }
    
    .quantity-input::-webkit-outer-spin-button,
    .quantity-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    
    .quantity-buttons {
      display: flex;
      gap: 0.375rem;
    }
    
    .quantity-btn {
      width: 2rem;
      height: 2rem;
      border-radius: 0.5rem;
      background: #374151;
      border: 1px solid #4b5563;
      color: #f9fafb;
      font-size: 1rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
      transition: all 0.15s ease;
    }
    
    .quantity-btn:hover {
      background: #4b5563;
    }
    
    .quantity-btn:active {
      transform: scale(0.95);
      background: #6b7280;
    }
    
    @media (max-width: 640px) {
      .part-item {
        padding: 0.625rem 0.875rem;
      }
      .part-name {
        font-size: 1.125rem; 
      }
    }
    
    @media (max-width: 480px) {
      .part-item {
        padding: 0.625rem 0.75rem;
      }
      .part-controls {
        flex-direction: row; 
        justify-content: flex-end;
      }
    }
    
    @supports (-webkit-touch-callout: none) {
      .part-item {
        -webkit-transform: translateZ(0);
      }
      .quantity-btn {
        -webkit-appearance: none;
        border-radius: 0.5rem;
      }
    }
    
    @media screen and (-webkit-min-device-pixel-ratio: 0) {
      .quantity-input {
        padding: 0.25rem;
      }
    }
    
    input[type="text"], input[type="number"], textarea {
      font-size: 1rem;
    }
    
    @media (max-width: 768px) {
      input[type="text"], input[type="number"], textarea {
        font-size: 16px; 
      }
    }
  </style>
</head>
<body class="min-h-screen bg-neutral-950 text-neutral-100">
  <main class="max-w-5xl mx-auto py-6 px-4">
    <section class="grid grid-cols-1 gap-3 mb-4">
      <div class="flex items-center gap-3 flex-wrap">

                class="rounded-2xl px-3 py-2 bg-red-700 hover:bg-red-600 border border-red-600"
                title="등록된 모든 기기를 삭제합니다. 되돌릴 수 없습니다.">
          등록된 기기 전체 삭제

        <span id="file-info" class="text-xs text-neutral-400">엑셀(.xlsx, .xls) 파일을 업로드하세요.</span>
      </div>

      <div class="panel p-4">
        <div class="flex items-center justify-between gap-3 flex-wrap">
          <div class="flex items-center gap-2">
            <h3 class="font-semibold">기기(일련번호) 관리</h3>
          </div>
          <div class="flex items-center gap-2">
            <span class="text-xs text-neutral-400">활성 기기: </span>
            <span id="active-device-label" class="text-xs text-indigo-300">없음</span>

        </div>

        <div class="mt-3 flex items-center gap-2 flex-wrap">
          <input id="device-input" type="text" 
                 class="rounded-xl px-3 py-2 bg-neutral-900 border border-neutral-700 w-64"

                 inputmode="numeric" />
          <button id="device-add-btn" class="btn bg-neutral-800 hover:bg-neutral-700 border border-neutral-700">추가</button>
          <span class="text-xs text-neutral-500">쉼표/공백으로 여러 개 입력 가능. 끝의 마침표/쉼표는 자동 제거됩니다.</span>
        </div>

        <div id="device-chips" class="flex flex-wrap gap-2 mt-2"></div>

        <div class="mt-3 flex items-center gap-2 flex-wrap">
          <button id="copy-all-log-btn" class="btn bg-indigo-600 hover:bg-indigo-500">

          </button>
          <button id="xlsx-all-btn" class="btn bg-orange-600 hover:bg-orange-500">
            <span id="xlsx-all-btn-text">전체 기기 XLSX 출력</span>
          </button>
          <button id="share-xlsx-btn" class="btn bg-purple-600 hover:bg-purple-500">
            <span id="share-xlsx-btn-text">XLSX 파일 공유</span>

        </div>

        <div class="mt-3 flex items-center gap-3">
          <span class="text-sm text-neutral-300">부품 사용 상태</span>
          <div class="seg inline-flex">
            <button id="usage-used" class="text-sm">부품 사용</button>
            <button id="usage-unused" class="text-sm" title="선택된 부품이 있으면 비활성화됩니다">장력조절</button>
          </div>
        </div>

        <!-- 태그 섹션 -->
        <div class="mt-3">
          <div class="flex items-center justify-between gap-2 mb-2">
            <span class="text-sm text-neutral-300">XLSX 메모 태그</span>
            <div class="flex items-center gap-2">
              <button id="add-tag-btn" class="text-xs px-2 py-1 bg-blue-600 hover:bg-blue-500 rounded-lg border" title="새 태그 추가">

              <button id="manage-tags-btn" class="text-xs px-2 py-1 bg-gray-600 hover:bg-gray-500 rounded-lg border" title="태그 관리">

        <!-- 고장증상 입력 섹션 -->

          </div>
          <div id="symptom-section">

            <button id="tag-save-btn" class="px-3 py-2 bg-blue-600 hover:bg-blue-500 rounded-lg">추가</button>

        <!-- 태그 카테고리 매핑 섹션 -->

          </div>
          <div class="text-xs text-neutral-400 mb-3">
            발견된 태그들을 자전거, 킥보드, 공용으로 분류해주세요.

      <div id="category-bar" class="flex items-center gap-2 overflow-x-auto custom-scroll mt-2"></div>

    <section class="grid grid-cols-1 md:grid-cols-2 gap-6">

                 placeholder="부품 검색... (초성 검색 가능: ㅂㄹㅌ → 볼트)"
                 class="w-full rounded-2xl px-4 py-2 bg-neutral-900 border border-neutral-800 focus:outline-none focus:ring-2 focus:ring-indigo-500" />

      </div>

          <h2 class="text-lg font-semibold">선택된 항목</h2>
          <span id="active-device-mini" class="text-xs text-neutral-400"></span>

  <script>
    const CHOSUNG = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
    
    function getChosung(str) {
      return str.split('').map(char => {
        const code = char.charCodeAt(0);
        if (code >= 44032 && code <= 55203) {
          const base = code - 44032;
          const choIdx = Math.floor(base / 588);
          return CHOSUNG[choIdx];
        }
        return char;
      }).join('');
    }
    
    function matchesChosung(text, query) {
      const textChosungNoSpace = getChosung(text.replace(/\s+/g, ''));
      const textChosung = getChosung(text);
      const queryNoSpace = query.replace(/\s+/g, '');
      
      return textChosungNoSpace.includes(queryNoSpace) || 
             textChosung.includes(query) ||
             textChosungNoSpace.includes(query) ||
             textChosung.includes(queryNoSpace);
    }

    function highlightText(text, query) {
      if (!query.trim()) return text;
      
      const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
      return text.replace(regex, '<span class="highlight">$1</span>');
    }

    function getCurrentTimestamp() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');
      const hour = String(now.getHours()).padStart(2, '0');
      const min = String(now.getMinutes()).padStart(2, '0');
      const sec = String(now.getSeconds()).padStart(2, '0');
      
      return `${year}-${month}-${day}_${hour}-${min}-${sec}`;
    }

    function getCurrentDate() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');
      
      return `${year}-${month}-${day}`;
    }

    function getByteLength(str) {
      return new Blob([str], { type: 'text/plain' }).size;
    }

    function truncateToBytes(str, maxBytes) {
      let truncated = '';
      let byteLength = 0;
      
      for (let i = 0; i < str.length; i++) {
        const char = str[i];
        const charBytes = getByteLength(char);
        
        if (byteLength + charBytes > maxBytes) {
          break;
        }
        
        truncated += char;
        byteLength += charBytes;
      }
      
      return truncated;
    }

    function generateMemoWithLimit(entries, activeTags = []) {
      const maxBytes = 290;
      let memoTokens = [];
      
      for (const [pid, qty] of entries) {
        const part = parts.find(x => x.id === pid);
        if (!part) continue;
        
        const base = part.name.replace(/\s+/g, "");
        const n = Number(qty) || 0;
        const token = n <= 1 ? base : `${base}${n}`;
        
        let tagPrefix = '';
        if (activeTags.length > 0) {
          const sTags = activeTags.filter(t => t === 'S');
          const slashTags = activeTags.filter(t => t !== 'S');
          
          let prefix = '';
          if (sTags.length > 0) {
            prefix += '[S]';
          }
          if (slashTags.length > 0) {
            prefix += slashTags.join(',') + '/';
          }
          tagPrefix = prefix;
        }
        
        const testMemo = `${tagPrefix}${[...memoTokens, token].join(",")}`;
        
        if (getByteLength(testMemo) <= maxBytes) {
          memoTokens.push(token);
        } else {
          break;
        }
      }
      
      let finalMemo = memoTokens.join(",");
      if (activeTags.length > 0) {
        const sTags = activeTags.filter(t => t === 'S');
        const slashTags = activeTags.filter(t => t !== 'S');
        
        let prefix = '';
        if (sTags.length > 0) {
          prefix += '[S]';
        }
        if (slashTags.length > 0) {
          prefix += slashTags.join(',') + '/';
        }
        
        if (prefix) {
          finalMemo = prefix + finalMemo;
        }
      }
      
      return finalMemo;
    }

    // 파일 생성 및 꾸미기 공통 함수
    function buildXLSXWorkbook() {
      if (!Array.isArray(devices) || devices.length === 0) {
        alert('출력할 기기가 없습니다.');
        return null;
      }

      const wsData = [];
      wsData.push(['기기번호', '부품명(필수입력)', '', '수량', '', '', '', '정비내용', '', '정비메모']);
      
      const sorted = [...devices].sort((a,b) => {
        const na = Number(a.id), nb = Number(b.id);
        if (!Number.isNaN(na) && !Number.isNaN(nb)) return na - nb;
        return String(a.id).localeCompare(String(b.id), 'ko');
      });

      sorted.forEach((device, deviceIndex) => {
        if (!device) return;
        
        if (device.used === false) {
          const symptom = truncateToBytes(device.symptom || '', 290);
          wsData.push([device.id, '장력조절', '', '', '', '', '', '', '', symptom]);
        } else {
          const entries = Object.entries(device.selected || {}).filter(([,q]) => Number(q) > 0);
          if (!entries.length) return;

          const memo = generateMemoWithLimit(entries, device.tags || []);
          const symptom = truncateToBytes(device.symptom || '', 290);

          let isFirstPart = true;
          entries.forEach(([pid, qty]) => {
            const part = parts.find(x => x.id === pid);
            if (!part) return;
            
            const originalPartName = part.originalName || part.name;
            
            wsData.push([
              isFirstPart ? device.id : '',
              originalPartName,
              '',
              Number(qty),
              '', '', '',
              isFirstPart ? memo : '',
              '',
              isFirstPart ? symptom : ''
            ]);
            
            isFirstPart = false;
          });
        }
        
        if (deviceIndex < sorted.length - 1) {
          wsData.push(['', '', '', '', '', '', '', '', '', '']);
        }
      });

      if (wsData.length <= 1) {
        alert('출력할 데이터가 없습니다.');
        return null;
      }

      const ws = XLSX.utils.aoa_to_sheet(wsData);
      
      ws['!cols'] = [
        { width: 10 }, 
        { width: 25 }, 
        { width: 5 },  
        { width: 8 },  
        { width: 5 },  
        { width: 5 },  
        { width: 5 },  
        { width: 20 }, 
        { width: 5 },  
        { width: 20 }  
      ];

      // === 셀 배경칠하기 (B ~ H) ===
      const lightYellowStyle = {
        fill: { fgColor: { rgb: "FFFFE0" } }
      };

      for (let R = 1; R < wsData.length; R++) {
        if (wsData[R][1]) {
          for (let C = 1; C <= 7; C++) { 
            const cellAddress = XLSX.utils.encode_cell({ r: R, c: C });
            if (!ws[cellAddress]) ws[cellAddress] = { t: 's', v: '' };
            ws[cellAddress].s = lightYellowStyle;
          }
        }
      }

      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, '전체기기부품사용내역');

      return wb;
    }

    async function shareXLSXFile() {
      const wb = buildXLSXWorkbook();
      if (!wb) return false;

      try {
        const xlsxBuffer = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
        const blob = new Blob([xlsxBuffer], { 
          type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' 
        });
        
        if (blob.size > 25 * 1024 * 1024) {
          alert('파일이 너무 큽니다. (25MB 제한)');
          return false;
        }
        
        const timestamp = getCurrentTimestamp();
        const fileName = `all_devices_${timestamp}.xlsx`;
        
        if (navigator.share && navigator.canShare) {
          const file = new File([blob], fileName, { 
            type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' 
          });
          
          const shareData = {
            title: '전체 기기 부품 사용내역',
            text: `${getCurrentDate()} 부품 사용내역 입니다.`, 
            files: [file]
          };
          
          if (navigator.canShare(shareData)) {
            await navigator.share(shareData);
            return true;
          }
        }
        
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = fileName;
        a.style.display = 'none';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        
        alert('지원하지 않는 브라우저이거나 모바일이 아닙니다. 파일이 대신 다운로드되었습니다.');
        return true;
        
      } catch (error) {
        console.error('공유 실패:', error);
        
        try {
          const xlsxBuffer = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
          const blob = new Blob([xlsxBuffer], { 
            type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' 
          });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `all_devices_${getCurrentTimestamp()}.xlsx`;
          a.click();
          URL.revokeObjectURL(url);
          return true;
        } catch (fallbackError) {
          alert('파일 공유/다운로드에 실패했습니다.');
          return false;
        }
      }
    }

    const STORAGE_KEY = 'parts-selector.v6';
    const MAPPING_KEY = 'tag-category-mapping.v1';
    const COMMON_TAG = "공용";
    
    let tagCategoryMapping = {};

    const $ = (sel) => document.querySelector(sel);
    const normKR = (s) => (s || "").normalize("NFKD").toLowerCase().replace(/\s+/g, "");

    const setStatus = (msg, isError=false) => {
      const el = $("#status");
      el.textContent = msg || "";
      el.className = "text-xs " + (isError ? "text-red-400" : "text-neutral-400");
    };

    function extractTagFromBrackets(text) {
      const match = text.match(/^\s*\[([^\]]+)\]/);
      return match ? match[1].trim() : "기타";
    }

    function stripBracketPrefix(raw) {
      const str = String(raw ?? "").trim();
      const m = str.match(/^\s*\[[^\]]+\]\s*(.*)$/);
      return m ? (m[1] || "").trim() : str;
    }

    function mapTagToGroup(tag) {
      return tagCategoryMapping[tag] || tag;
    }

    function saveTagMapping() {
      try {
        localStorage.setItem(MAPPING_KEY, JSON.stringify(tagCategoryMapping));
      } catch (e) {
        console.warn("태그 매핑 저장 실패:", e);
      }
    }

    function loadTagMapping() {
      try {
        const raw = localStorage.getItem(MAPPING_KEY);
        if (raw) {
          tagCategoryMapping = JSON.parse(raw);
        }
      } catch (e) {
        console.warn("태그 매핑 로드 실패:", e);
      }
    }

    let customTags = ["S", "봉유격", "홀가공", "오프라인"];
    let parts = [];
    let selected = {};          
    let activeCategory = null;  
    let query = "";
    let lastFileName = "";
    let lastSheetName = "";

    let devices = [];
    let activeDeviceId = null;

    let renderScheduled = {
      devices: false,
      list: false,
      chips: false,
      tags: false,
      categories: false,
      all: false
    };

    function scheduleRender(type = 'all') {
      if (renderScheduled[type]) return;
      renderScheduled[type] = true;

      requestAnimationFrame(() => {
        if (type === 'all') {
          renderDevices();
          renderCategoryBar();
          renderList();
          renderSelectedChips();
          renderCustomTags();
        } else {
          if (type === 'devices') renderDevices();
          if (type === 'list') renderList();
          if (type === 'chips') renderSelectedChips();
          if (type === 'tags') renderCustomTags();
          if (type === 'categories') renderCategoryBar();
        }
        renderScheduled[type] = false;
      });
    }

    let saveTimeout;
    function debouncedSave() {
      clearTimeout(saveTimeout);
      saveTimeout = setTimeout(saveState, 300);
    }

    function saveState() {
      try {
        const payload = {
          v: 6,
          customTags,
          parts, selected, activeCategory, query,
          meta: { fileName: lastFileName, sheetName: lastSheetName },
          devices, activeDeviceId
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
      } catch (e) { console.warn("상태 저장 실패:", e); }
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) {
          return migrateFromPreviousVersion();
        }
        
        const data = JSON.parse(raw);
        if (!data || !Array.isArray(data.parts)) return false;

        customTags = Array.isArray(data.customTags) ? data.customTags : ["S", "봉유격", "홀가공", "오프라인"];
        
        parts = data.parts.map(p => {
          const tags = Array.isArray(p.tags) ? p.tags : ["기타"];
          const groupTags = Array.isArray(p.groupTags) && p.groupTags.length ? p.groupTags : tags.map(mapTagToGroup);
          return {
            id: p.id || `${(p.name||"")}||${tags.slice().sort().join('/')}`,
            tags,
            groupTags,
            name: stripBracketPrefix(p.name || ""),
            originalName: p.originalName || p.name || "",
            normName: p.normName || normKR(p.name || "")
          };
        });
        selected = data.selected || {};
        query = data.query || "";
        activeCategory = data.activeCategory || null;
        lastFileName = data.meta?.fileName || "";
        lastSheetName = data.meta?.sheetName || "";

        devices = Array.isArray(data.devices) ? data.devices.map(d => ({
          id: d.id,
          selected: d.selected || {},
          used: typeof d.used === 'boolean' ? d.used : true,
          tags: Array.isArray(d.tags) ? d.tags : [],
          symptom: d.symptom || ''
        })) : [];
        activeDeviceId = data.activeDeviceId || null;

        if (activeDeviceId) {
          const dev = devices.find(x => x.id === activeDeviceId);
          if (dev) selected = { ...dev.selected };
        }
        return true;
      } catch (e) {
        console.warn("상태 로드 실패:", e);
        return false;
      }
    }

    function migrateFromPreviousVersion() {
      const oldKeys = ['parts-selector.v5', 'parts-selector.v4', 'parts-selector.v3'];
      
      for (const key of oldKeys) {
        try {
          const oldRaw = localStorage.getItem(key);
          if (oldRaw) {
            const oldData = JSON.parse(oldRaw);
            
            parts = oldData.parts || [];
            selected = oldData.selected || {};
            query = oldData.query || "";
            activeCategory = oldData.activeCategory || null;
            lastFileName = oldData.meta?.fileName || "";
            lastSheetName = oldData.meta?.sheetName || "";
            customTags = oldData.customTags || ["S", "봉유격", "홀가공", "오프라인"];
            
            devices = Array.isArray(oldData.devices) ? oldData.devices.map(d => ({
              id: d.id,
              selected: d.selected || {},
              used: typeof d.used === 'boolean' ? d.used : true,
              tags: Array.isArray(d.tags) ? d.tags : (d.sTag ? ["S"] : []),
              symptom: ''
            })) : [];
            
            activeDeviceId = oldData.activeDeviceId || null;
            
            saveState();
            return true;
          }
        } catch (e) {
          continue;
        }
      }
      return false;
    }

    function updateFileInfo(text) {
      const el = $("#file-info");
      if (el) el.textContent = text || "";
    }

    function buildCategories() {
      const set = new Set();
      parts.forEach(p => {
        const gs = Array.isArray(p.groupTags) ? p.groupTags : (Array.isArray(p.tags) ? p.tags.map(mapTagToGroup) : []);
        gs.forEach(g => set.add(g));
      });
      return Array.from(set);
    }

    function getFiltered() {
      const qn = normKR(query);
      const isChosung = /^[ㄱ-ㅎ\s]+$/.test(query.trim());
      
      return parts.filter(p => {
        const gs = Array.isArray(p.groupTags) ? p.groupTags : (Array.isArray(p.tags) ? p.tags.map(mapTagToGroup) : []);
        const catOk = !activeCategory || gs.includes(activeCategory) || gs.includes(COMMON_TAG);
        
        let txtOk = true;
        if (query.trim()) {
          if (isChosung) {
            txtOk = matchesChosung(p.name, query.trim());
          } else {
            txtOk = p.normName.includes(qn);
          }
        }
        
        return catOk && txtOk;
      });
    }

    function sanitizeDeviceId(raw) {
      const s = String(raw || '').trim();
      return s.replace(/[.,;]+$/g, '');
    }
    function ensureDevice(id) {
      id = sanitizeDeviceId(id);
      if (!id) return null;
      let d = devices.find(x => x.id === id);
      if (!d) {
        d = { id, selected: {}, used: true, tags: [], symptom: '' };
        devices.push(d);
      }
      return d;
    }
    function switchActiveDevice(id) {
      if (activeDeviceId) {
        const prev = devices.find(x => x.id === activeDeviceId);
        if (prev) prev.selected = { ...selected };
      }
      activeDeviceId = id;
      const cur = devices.find(x => x.id === activeDeviceId);
      selected = cur ? { ...cur.selected } : {};
      debouncedSave();
      updateSymptomInput();
      scheduleRender('all');
    }
    function removeDevice(id) {
      const idx = devices.findIndex(x => x.id === id);
      if (idx >= 0) devices.splice(idx, 1);
      if (activeDeviceId === id) {
        activeDeviceId = null;
        selected = {};
        updateSymptomInput();
      }
      debouncedSave();
      scheduleRender('all');
    }
    function syncSelectedToActiveDevice() {
      if (!activeDeviceId) return;
      const cur = devices.find(x => x.id === activeDeviceId);
      if (!cur) return;
      cur.selected = { ...selected };
      debouncedSave();
    }

    function hasActiveSelection() {
      return Object.values(selected || {}).some(v => Number(v) > 0);
    }

    function updateUsageButtons() {
      const usedBtn = $("#usage-used");
      const unusedBtn = $("#usage-unused");
      const hasActive = !!activeDeviceId;
      const hasSel = hasActive && hasActiveSelection();

      usedBtn.disabled = !hasActive;
      unusedBtn.disabled = !hasActive || hasSel;

      [usedBtn, unusedBtn].forEach(b => {
        b.classList.toggle("opacity-50", b.disabled);
        b.classList.toggle("cursor-not-allowed", b.disabled);
      });

      if (!hasActive) {
        usedBtn.title = "활성 기기를 먼저 선택하세요.";
        unusedBtn.title = "활성 기기를 먼저 선택하세요.";
      } else if (hasSel) {
        usedBtn.title = "";
        unusedBtn.title = "선택된 부품이 있어 장력조절로 전환할 수 없습니다.";
      } else {
        usedBtn.title = "";
        unusedBtn.title = "";
      }
    }

    function updateSymptomInput() {
      const input = $("#symptom-input");
      const section = $("#symptom-section");
      
      if (activeDeviceId) {
        const device = devices.find(x => x.id === activeDeviceId);
        input.disabled = false;
        input.value = device ? device.symptom || '' : '';
        section.querySelector('.text-xs').textContent = '고장 증상을 입력하세요 (XLSX 정비메모 열에 출력됩니다)';
      } else {
        input.disabled = true;
        input.value = '';
        section.querySelector('.text-xs').textContent = '활성 기기를 선택하면 고장증상을 입력할 수 있습니다.';
      }
      
      updateSymptomCounter();
    }

    function updateSymptomCounter() {
      const input = $("#symptom-input");
      const counter = $("#symptom-counter");
      const value = input.value || '';
      const byteLength = getByteLength(value);
      
      counter.textContent = `${byteLength}/290 바이트`;
      
      if (byteLength > 290) {
        counter.classList.add('text-red-400');
        counter.classList.remove('text-neutral-500');
      } else {
        counter.classList.add('text-neutral-500');
        counter.classList.remove('text-red-400');
      }
    }

    function saveSymptom() {
      if (!activeDeviceId) return;
      const device = devices.find(x => x.id === activeDeviceId);
      if (!device) return;
      
      const input = $("#symptom-input");
      device.symptom = input.value || '';
      debouncedSave();
    }

    function renderCustomTags() {
      const container = $("#custom-tags-container");
      container.innerHTML = "";
      
      if (!activeDeviceId) {
        const span = document.createElement("span");
        span.className = "text-neutral-500 text-sm";
        span.textContent = "활성 기기를 선택하세요.";
        container.appendChild(span);
        return;
      }
      
      const currentDevice = devices.find(x => x.id === activeDeviceId);
      if (!currentDevice) return;
      
      const fragment = document.createDocumentFragment();
      customTags.forEach(tag => {
        const isActive = currentDevice.tags && currentDevice.tags.includes(tag);
        const btn = document.createElement("button");
        btn.className = `tag-btn rounded-full px-3 py-1 text-sm border ${
          isActive ? 'active' : 'bg-neutral-900 border-neutral-700 hover:bg-neutral-800'
        }`;
        btn.textContent = `[${tag}]`;
        btn.title = `${tag} 태그 ${isActive ? '비활성화' : '활성화'}`;
        btn.addEventListener("click", () => toggleTag(tag));
        fragment.appendChild(btn);
      });
      container.appendChild(fragment);
    }

    function toggleTag(tagName) {
      if (!activeDeviceId) return;
      const device = devices.find(x => x.id === activeDeviceId);
      if (!device) return;
      
      if (!device.tags) device.tags = [];
      
      const index = device.tags.indexOf(tagName);
      if (index > -1) {
        device.tags.splice(index, 1);
      } else {
        device.tags.push(tagName);
      }
      
      debouncedSave();
      scheduleRender('devices');
      scheduleRender('tags');
    }

    function addCustomTag() {
      const input = $("#tag-input");
      const tagName = input.value.trim();
      
      if (!tagName) {
        alert("태그 이름을 입력해주세요.");
        return;
      }
      
      if (customTags.includes(tagName)) {
        alert("이미 존재하는 태그입니다.");
        return;
      }
      
      customTags.push(tagName);
      input.value = "";
      hideTagInputModal();
      debouncedSave();
      scheduleRender('tags');
      renderTagManageList();
    }

    function removeCustomTag(tagName) {
      if (!confirm(`"${tagName}" 태그를 삭제하시겠습니까?\n모든 기기에서 이 태그가 제거됩니다.`)) {
        return;
      }
      
      const index = customTags.indexOf(tagName);
      if (index > -1) {
        customTags.splice(index, 1);
      }
      
      devices.forEach(device => {
        if (device.tags) {
          const tagIndex = device.tags.indexOf(tagName);
          if (tagIndex > -1) {
            device.tags.splice(tagIndex, 1);
          }
        }
      });
      
      debouncedSave();
      scheduleRender('tags');
      renderTagManageList();
      scheduleRender('devices');
    }

    function showTagInputModal() {
      $("#tag-input-modal").classList.remove("hidden");
      $("#tag-input").focus();
    }

    function hideTagInputModal() {
      $("#tag-input-modal").classList.add("hidden");
      $("#tag-input").value = "";
    }

    function showTagManageModal() {
      $("#tag-manage-modal").classList.remove("hidden");
      renderTagManageList();
    }

    function hideTagManageModal() {
      $("#tag-manage-modal").classList.add("hidden");
    }

    function renderTagManageList() {
      const list = $("#manage-tags-list");
      list.innerHTML = "";
      
      const fragment = document.createDocumentFragment();
      customTags.forEach(tag => {
        const item = document.createElement("div");
        item.className = "flex items-center justify-between gap-2 p-2 border border-neutral-700 rounded-lg";
        
        const tagLabel = document.createElement("span");
        tagLabel.className = "text-sm";
        tagLabel.textContent = `[${tag}]`;
        
        const deleteBtn = document.createElement("button");
        deleteBtn.className = "text-xs px-2 py-1 bg-red-600 hover:bg-red-500 rounded-lg text-white";
        deleteBtn.textContent = "삭제";
        deleteBtn.addEventListener("click", () => removeCustomTag(tag));
        
        item.append(tagLabel, deleteBtn);
        fragment.appendChild(item);
      });
      
      if (customTags.length === 0) {
        const emptyMsg = document.createElement("div");
        emptyMsg.className = "text-neutral-500 text-sm text-center py-4";
        emptyMsg.textContent = "등록된 커스텀 태그가 없습니다.";
        fragment.appendChild(emptyMsg);
      }
      
      list.appendChild(fragment);
    }

    function renderDevices() {
      const chips = $("#device-chips");
      chips.innerHTML = "";
      const label = $("#active-device-label");
      const mini = $("#active-device-mini");
      label.textContent = activeDeviceId || "없음";
      mini.textContent = activeDeviceId ? `기기: ${activeDeviceId}` : "";

      const fragment = document.createDocumentFragment();
      
      if (!devices.length) {
        const span = document.createElement("span");
        span.className = "text-neutral-500 text-sm";
        span.textContent = "일련번호를 추가하세요.";
        fragment.appendChild(span);
      } else {
        const sorted = [...devices].sort((a,b)=>{
          const na = Number(a.id), nb = Number(b.id);
          if (!Number.isNaN(na) && !Number.isNaN(nb)) return na - nb;
          return String(a.id).localeCompare(String(b.id), 'ko');
        });
        sorted.forEach(d=>{
          const count = Object.values(d.selected || {}).reduce((s,v)=> s + (Number(v)||0), 0);
          const isActive = activeDeviceId === d.id;
          const wrap = document.createElement("div");
          wrap.className = `flex items-center gap-1 rounded-full px-2 py-1 border ${isActive ? "bg-indigo-600 border-indigo-500" : "bg-neutral-900 border-neutral-700"}`;

          const btn = document.createElement("button");
          btn.className = "px-2";
          let displayText = count ? `${d.id}(${count})` : d.id;
          if (d.tags && d.tags.length > 0) {
            const tagPrefix = d.tags.map(t => `[${t}]`).join('');
            displayText = `${tagPrefix}${displayText}`;
          }
          btn.textContent = displayText;
          
          const tooltipParts = [d.used ? "부품 사용" : "장력조절"];
          if (d.tags && d.tags.length > 0) {
            tooltipParts.push(`태그: ${d.tags.join(', ')}`);
          }
          if (d.symptom) {
            tooltipParts.push(`증상: ${d.symptom.substring(0, 50)}${d.symptom.length > 50 ? '...' : ''}`);
          }
          btn.title = tooltipParts.join(' • ');
          
          btn.addEventListener("click", ()=> switchActiveDevice(d.id));

          const del = document.createElement("button");
          del.className = "rounded-full px-2 hover:bg-neutral-800";
          del.textContent = "✕";
          del.title = "삭제";
          del.addEventListener("click", ()=> removeDevice(d.id));

          wrap.append(btn, del);
          fragment.appendChild(wrap);
        });
      }

      chips.appendChild(fragment);

      const usedBtn = $("#usage-used");
      const unusedBtn = $("#usage-unused");
      usedBtn.classList.remove("active");
      unusedBtn.classList.remove("active");
      if (activeDeviceId) {
        const cur = devices.find(x => x.id === activeDeviceId);
        if (cur && cur.used) usedBtn.classList.add("active");
        else unusedBtn.classList.add("active");
      }
      updateUsageButtons();
    }

    function renderCategoryBar() {
      const bar = $("#category-bar");
      bar.innerHTML = "";
      if (parts.length === 0) return;

      const cats = buildCategories();
      const fragment = document.createDocumentFragment();
      cats.forEach(cat => {
        const isActive = activeCategory === cat;
        const btn = document.createElement("button");
        btn.textContent = cat;
        btn.className = `rounded-full px-3 py-1 border select-none ${isActive ? "bg-indigo-600 border-indigo-500" : "bg-neutral-900 border-neutral-700 hover:bg-neutral-800"}`;
        btn.addEventListener("click", () => {
          activeCategory = (activeCategory === cat) ? null : cat;
          debouncedSave();
          scheduleRender('categories');
          scheduleRender('list');
        });
        fragment.appendChild(btn);
      });
      bar.appendChild(fragment);
    }

    function toggleSelectionById(id) {
      if (selected[id] && selected[id] > 0) {
        delete selected[id];
      } else {
        selected[id] = 1;
      }
      scheduleRender('chips');
      syncSelectedToActiveDevice();
    }

    function renderList() {
      const container = $("#list");
      container.innerHTML = "";

      if (parts.length === 0) {
        const empty = document.createElement("div");
        empty.className = "text-neutral-500 text-sm py-8 text-center";
        empty.textContent = "엑셀 파일을 업로드하세요.";
        container.appendChild(empty);
        $("#count").textContent = "(0)";
        $("#search-info").textContent = "";
        scheduleRender('chips');
        return;
      }

      const filtered = getFiltered();
      $("#count").textContent = `(${filtered.length})`;
      
      const searchInfo = $("#search-info");
      if (query.trim()) {
        const isChosung = /^[ㄱ-ㅎ\s]+$/.test(query.trim());
        searchInfo.textContent = isChosung ? 
          `초성 검색: "${query}" → ${filtered.length}건` : 
          `검색: "${query}" → ${filtered.length}건`;
      } else {
        searchInfo.textContent = "";
      }

      if (filtered.length === 0) {
        const none = document.createElement("div");
        none.className = "text-neutral-500 text-sm py-8 text-center";
        none.textContent = "검색 결과가 없습니다.";
        container.appendChild(none);
        scheduleRender('chips');
        return;
      }

      const chunkSize = 30;
      const renderChunk = (startIndex) => {
        const endIndex = Math.min(startIndex + chunkSize, filtered.length);
        const fragment = document.createDocumentFragment();
        
        for (let i = startIndex; i < endIndex; i++) {
          const p = filtered[i];
          const isChecked = selected[p.id] != null && selected[p.id] > 0;
          const qty = isChecked ? selected[p.id] : 1;

          const item = document.createElement("div");
          item.className = `part-item ${isChecked ? 'selected' : ''}`;

          const mainSection = document.createElement("div");
          mainSection.className = "part-main";

          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.checked = isChecked;
          checkbox.className = "part-checkbox";
          checkbox.addEventListener("change", () => {
            if (checkbox.checked) {
              selected[p.id] = Math.max(1, Number(qty) || 1);
              item.classList.add('selected');
            } else {
              delete selected[p.id];
              item.classList.remove('selected');
            }
            scheduleRender('chips');
            syncSelectedToActiveDevice();
          });

          const infoSection = document.createElement("div");
          infoSection.className = "part-info";

          const tagsContainer = document.createElement("div");
          tagsContainer.className = "part-tags";
          p.tags.forEach(t => {
            const tagChip = document.createElement("span");
            tagChip.className = "part-tag";
            tagChip.textContent = `[${t}]`;
            tagsContainer.appendChild(tagChip);
          });

          const partName = document.createElement("div");
          partName.className = "part-name";
          partName.innerHTML = highlightText(p.name, query.trim());

          infoSection.appendChild(tagsContainer);
          infoSection.appendChild(partName);

          const clickHandler = (e) => {
            if (e.target === checkbox) return; 
            e.preventDefault();
            checkbox.checked = !checkbox.checked;
            checkbox.dispatchEvent(new Event('change'));
          };
          
          infoSection.addEventListener("click", clickHandler);

          mainSection.appendChild(checkbox);
          mainSection.appendChild(infoSection);

          const controlsSection = document.createElement("div");
          controlsSection.className = "part-controls";

          const quantityLabel = document.createElement("span");
          quantityLabel.className = "quantity-label";
          quantityLabel.textContent = "수량";

          const quantitySection = document.createElement("div");
          quantitySection.className = "quantity-section";

          const quantityInput = document.createElement("input");
          quantityInput.type = "number";
          quantityInput.min = "1";
          quantityInput.value = String(qty);
          quantityInput.className = "quantity-input";

          const setQty = (val) => {
            const v = Math.max(1, Math.floor(Number(val) || 1));
            quantityInput.value = String(v);
            selected[p.id] = v;
            if (!checkbox.checked) {
              checkbox.checked = true;
              item.classList.add('selected');
            }
            scheduleRender('chips');
            syncSelectedToActiveDevice();
          };

          quantityInput.addEventListener("input", () => setQty(quantityInput.value));
          quantityInput.addEventListener("focus", (e) => e.target.select());

          const buttonsContainer = document.createElement("div");
          buttonsContainer.className = "quantity-buttons";

          const plusBtn = document.createElement("button");
          plusBtn.textContent = "+";
          plusBtn.className = "quantity-btn";
          plusBtn.addEventListener("click", () => setQty(Number(quantityInput.value) + 1));

          const minusBtn = document.createElement("button");
          minusBtn.textContent = "−";
          minusBtn.className = "quantity-btn";
          minusBtn.addEventListener("click", () => setQty(Math.max(1, Number(quantityInput.value) - 1)));

          buttonsContainer.append(plusBtn, minusBtn);
          quantitySection.append(quantityInput, buttonsContainer);

          controlsSection.appendChild(quantityLabel);
          controlsSection.appendChild(quantitySection);

          item.appendChild(mainSection);
          item.appendChild(controlsSection);
          fragment.appendChild(item);
        }
        
        container.appendChild(fragment);
        
        if (endIndex < filtered.length) {
          setTimeout(() => renderChunk(endIndex), 16); 
        }
      };

      renderChunk(0);
      
      scheduleRender('chips');
    }

    function renderSelectedChips() {
      const box = $("#selected-chips");

    function buildAllLogs() {
      if (!Array.isArray(devices) || devices.length === 0) return "";

      const sorted = [...devices].sort((a,b)=>{
        const na = Number(a.id), nb = Number(b.id);
        if (!Number.isNaN(na) && !Number.isNaN(nb)) return na - nb;
        return String(a.id).localeCompare(String(b.id), 'ko');
      });

      const lines = [];
      for (const d of sorted) {
        if (!d) continue;

        if (d.used === false) {
          lines.push(`${d.id} 장력조절`);
          continue;
        }

        const entries = Object.entries(d.selected || {}).filter(([,q]) => Number(q) > 0);
        if (!entries.length) continue;

        const tokens = [];
        for (const [pid, qty] of entries) {
          const p = parts.find(x => x.id === pid);
          if (!p) continue;
          const base = (p.name || "").replace(/\s+/g, "");
          const n = Number(qty) || 0;
          tokens.push(n <= 1 ? base : `${base}x${n}`);
        }
        if (tokens.length) lines.push(`${d.id} ${tokens.join(",")} 교체`);
      }

      return lines.join("\n");
    }

    async function copyAllLogs() {
      const text = buildAllLogs();
      if (!text.trim()) { alert("복사할 로그가 없습니다."); return; }
      try {
        await navigator.clipboard.writeText(text);
        showCopySuccess($("#copy-all-log-btn"), $("#copy-all-log-btn-text"));
      } catch (e) {
        alert("복사에 실패했어요. 수동으로 복사해 주세요.\n\n" + text);
      }
    }

    function deleteAllDevices() {
      if (!devices.length) { alert("삭제할 기기가 없습니다."); return; }
      
      const ok1 = confirm("등록된 모든 기기를 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.");
      if (!ok1) return;
      
      const ok2 = confirm("정말로 삭제하시겠습니까?");
      if (!ok2) return;
      
      devices = [];
      activeDeviceId = null;
      selected = {};
      updateSymptomInput();
      debouncedSave();
      scheduleRender('all');
      alert("등록된 모든 기기를 삭제했습니다.");
    }

    function pickFirstNonEmptySheet(wb) {
      for (const name of wb.SheetNames) {
        const ws = wb.Sheets[name];
        const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "", raw: false });
        const hasData = Array.isArray(rows) && rows.some(r => Array.isArray(r) && r.some(c => String(c ?? "").trim() !== ""));
        if (hasData) return { ws, rows, sheetName: name };
      }
      return { ws: null, rows: [], sheetName: "" };
    }

    function parseRows(rows) {
      const start = 1; 
      const parsed = [];
      let skipped = 0;
      let foundTags = new Set(); 
      
      for (let r = start; r < rows.length; r++) {
        const row = rows[r] || [];
        const nameRaw = String(row[11] || "").trim(); 
        
        const originalName = nameRaw;
        
        if (!nameRaw) { skipped++; continue; }
        
        const tag = extractTagFromBrackets(nameRaw);
        foundTags.add(tag);
        
        const name = stripBracketPrefix(nameRaw);
        
        if (!name) { skipped++; continue; }
        
        const tags = [tag];
        const id = `${name}||${tags.slice().sort().join('/')}`;
        const groupTags = tags.map(t => mapTagToGroup(t));
        
        parsed.push({ 
          id, tags, groupTags, 
          name,
          originalName,
          normName: normKR(name) 
        });
      }
      return { parsed, skipped, foundTags: Array.from(foundTags) };
    }

    function renderTagMappingList(foundTags) {
      const list = $("#tag-mapping-list");
      list.innerHTML = "";
      
      const fragment = document.createDocumentFragment();
      foundTags.forEach(tag => {
        if (tag === "기타") return; 
        
        const item = document.createElement("div");
        item.className = "flex items-center justify-between gap-2 p-2 border border-neutral-700 rounded-lg";
        
        const tagLabel = document.createElement("span");
        tagLabel.className = "text-sm font-mono";
        tagLabel.textContent = `[${tag}]`;
        
        const selectWrap = document.createElement("div");
        selectWrap.className = "flex items-center gap-2";
        
        const arrow = document.createElement("span");
        arrow.className = "text-neutral-500";
        arrow.textContent = "→";
        
        const select = document.createElement("select");
        select.className = "text-sm px-2 py-1 bg-neutral-800 border border-neutral-600 rounded";
        
        const options = ["자전거", "킥보드", "공용"];
        options.forEach(opt => {
          const option = document.createElement("option");
          option.value = opt;
          option.textContent = opt;
          if (tagCategoryMapping[tag] === opt) {
            option.selected = true;
          }
          select.appendChild(option);
        });
        
        select.addEventListener("change", () => {
          tagCategoryMapping[tag] = select.value;
          saveTagMapping();
        });
        
        selectWrap.append(arrow, select);
        item.append(tagLabel, selectWrap);
        fragment.appendChild(item);
      });
      
      if (foundTags.length <= 1) { 
        const emptyMsg = document.createElement("div");
        emptyMsg.className = "text-neutral-500 text-sm text-center py-4";
        emptyMsg.textContent = "매핑할 태그가 없습니다.";
        fragment.appendChild(emptyMsg);
      }
      
      list.appendChild(fragment);
    }

    function autoMapTags(foundTags) {
      foundTags.forEach(tag => {
        if (tag === "기타") return;
        
        const lowerTag = tag.toLowerCase();
        if (lowerTag.includes('b2') || lowerTag.includes('자전거')) {
          tagCategoryMapping[tag] = "자전거";
        } else if (lowerTag.includes('pl') || lowerTag.includes('킥보드')) {
          tagCategoryMapping[tag] = "킥보드";
        } else if (lowerTag.includes('공용') || lowerTag.includes('common')) {
          tagCategoryMapping[tag] = "공용";
        } else {
          tagCategoryMapping[tag] = "공용";
        }
      });
      
      saveTagMapping();
      renderTagMappingList(foundTags);
    }

    function resetTagMapping(foundTags) {
      foundTags.forEach(tag => {
        if (tagCategoryMapping[tag]) {
          delete tagCategoryMapping[tag];
        }
      });
      saveTagMapping();
      renderTagMappingList(foundTags);
    }

    function showMappingPanel(rows) {
      const panel = $("#mapping-panel");
      const preview = $("#map-preview");
      const hint = $("#mapping-hint");

      hint.textContent = "L열에서 부품 정보를 자동으로 가져옵니다. (2행부터 시작)";

      const lines = [];
      for (let r = 1; r < Math.min(rows.length, 11); r++) {
        const row = rows[r] || [];
        const nameRaw = String(row[11] || "").trim();
        if (!nameRaw) continue;
        
        const tag = extractTagFromBrackets(nameRaw);
        const name = stripBracketPrefix(nameRaw);
        if (!name) continue;
        
        lines.push(`[${tag}] ${name}`);
      }
      preview.textContent = lines.length ? lines.join("\n") : "(L열에 데이터가 없습니다)";

      const { foundTags } = parseRows(rows);
      renderTagMappingList(foundTags);
      
      $("#auto-map-btn").onclick = () => autoMapTags(foundTags);
      $("#reset-map-btn").onclick = () => resetTagMapping(foundTags);

      $("#map-apply").onclick = () => {
        const { parsed, skipped } = parseRows(rows);
        
        if (parsed.length === 0) { 
          alert("파싱 결과가 0건입니다. L열에 올바른 데이터가 있는지 확인해주세요."); 
          return; 
        }
        
        parts = parsed;
        selected = {};
        activeCategory = null;
        query = "";
        $("#search").value = "";
        debouncedSave();
        scheduleRender('all');
        setStatus(`L열 파싱 완료: 총 ${parts.length}건 (스킵: ${skipped}건)`, false);
        panel.classList.add("hidden");
      };

      $("#map-cancel").onclick = () => {
        panel.classList.add("hidden");
      };

      panel.classList.remove("hidden");
    }

    async function processFile(file) {
      setStatus("");
      const ext = (file.name.split(".").pop() || "").toLowerCase();
      if (!["xlsx", "xls"].includes(ext)) {
        setStatus("엑셀 파일만 업로드 가능합니다. (.xlsx, .xls)", true);
        alert("엑셀 파일만 업로드 가능합니다. (.xlsx, .xls)");
        return;
      }

      const ok = await ensureXLSX();
      if (!ok) {
        setStatus("XLSX 라이브러리를 불러오지 못했습니다. 네트워크/정책 이슈일 수 있습니다.", true);
        alert("XLSX 라이브러리를 불러오지 못했습니다.");
        return;
      }

      const reader = new FileReader();
      reader.onload = () => {
        try {
          const wb = XLSX.read(new Uint8Array(reader.result), { type: "array" });
          const chosen = pickFirstNonEmptySheet(wb);
          if (!chosen.ws) throw new Error("모든 시트가 비어 있음");
          const rows = chosen.rows;
          lastSheetName = chosen.sheetName;
          lastFileName = file.name;
          updateFileInfo(`${file.name} • ${lastSheetName} 로드됨`);

          let hasLColumnData = false;
          for (let r = 1; r < rows.length; r++) {
            if (rows[r] && rows[r][11] && String(rows[r][11]).trim() !== "") {
              hasLColumnData = true;
              break;
            }
          }

          if (hasLColumnData) {
            showMappingPanel(rows);
          } else {
            setStatus("L열(12번째 열)에 데이터가 없습니다.", true);
            alert("L열에 데이터가 없습니다. 엑셀 형식을 다시 확인해주세요.");
          }

        } catch (err) {
          console.error(err);
          setStatus("파일을 읽는 중 문제가 발생했습니다.", true);
          alert("파일 파싱 중 오류가 발생했습니다.");
        }
      };

      reader.onerror = () => {
        setStatus("파일을 읽지 못했습니다. 파일 접근 권한 또는 손상 여부를 확인하세요.", true);
        alert("파일을 읽지 못했습니다.");
      };
      
      reader.readAsArrayBuffer(file);
    }

    $("#device-add-btn").addEventListener("click", ()=>{
      const raw = $("#device-input").value || "";
      const tokens = raw.split(/[\s,]+/).map(s=>sanitizeDeviceId(s)).filter(Boolean);
      tokens.forEach(t => ensureDevice(t));

      $("#device-input").value = "";

      scheduleRender('devices');

    $("#usage-unused").addEventListener("click", ()=>{

    $("#tag-manage-close-btn").addEventListener("click", hideTagManageModal);

      if (success) {

    $("#share-xlsx-btn").addEventListener("click", async () => {
      const success = await shareXLSXFile();
      if (success) {
        showShareSuccess($("#share-xlsx-btn"), $("#share-xlsx-btn-text"));

    $("#delete-all-devices-btn").addEventListener("click", deleteAllDevices);

    let searchTimeout;
    $("#search").addEventListener("input", (e) => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        query = e.target.value || "";
        debouncedSave();
        scheduleRender('list');
      }, 200);
    });

    $("#clear-btn").addEventListener("click", () => {
      selected = {};
      syncSelectedToActiveDevice();
      scheduleRender('list');
      scheduleRender('chips');
    });

    $("#reset-btn").addEventListener("click", () => {
      if (!confirm("저장된 데이터(부품 목록, 선택, 기기/사용상태, 검색/태그/매핑)를 모두 삭제할까요?")) return;
      parts = [];
      selected = {};
      activeCategory = null;
      query = "";
      lastFileName = "";
      lastSheetName = "";
      devices = [];
      activeDeviceId = null;
      customTags = ["S", "봉유격", "홀가공", "오프라인"];
      $("#search").value = "";
      localStorage.removeItem(STORAGE_KEY);
      updateFileInfo("엑셀(.xlsx, .xls) 파일을 업로드하세요.");
      setStatus("");
      updateSymptomInput();
      scheduleRender('all');
      $("#mapping-panel").classList.add("hidden");
    });

    $("#file-input").addEventListener("change", (e) => {
      const file = e.target.files && e.target.files[0]; 
      if (!file) return;
      processFile(file);
      e.target.value = "";
    });

    loadTagMapping(); 
    const restored = loadState();
    if (restored) {
      const more = lastSheetName ? ` • ${lastSheetName}` : "";
      updateFileInfo(`${lastFileName ? `${lastFileName}${more} (저장됨)` : "저장된 데이터"} • 총 ${parts.length}건`);
      $("#search").value = query || "";
    }
    
    updateSymptomInput();
    scheduleRender('all');

    (async () => {
      if (!(await ensureXLSX())) {
        setStatus("경고: XLSX 라이브러리를 불러오지 못했습니다. 네트워크/정책 차단 가능성.", true);
      }
    })();
  </script>
