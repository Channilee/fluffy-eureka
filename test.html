<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>부품 선택 → 쉼표 데이터 생성기 (일련번호/그룹태그/안정화)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    .custom-scroll::-webkit-scrollbar { height: 8px; width: 8px; }
    .custom-scroll::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 9999px; }
    .custom-scroll::-webkit-scrollbar-track { background: #18181b; }
    .dropzone { border: 2px dashed #3f3f46; border-radius: 16px; }
    .dropzone.dragover { background: rgba(99,102,241,0.08); border-color: #6366f1; }
    .panel { border: 1px solid #262626; border-radius: 16px; background: #0b0b0c; }
    .btn { border-radius: 12px; padding: 8px 12px; }
    .seg { border-radius: 9999px; overflow: hidden; border: 1px solid #3f3f46; }
    .seg > button { padding: 6px 12px; }
    .seg .active { background: #6366f1; }
    
    .copy-success {
      background-color: #10b981 !important;
      transition: all 0.3s ease;
    }
    
    .highlight {
      background-color: #fbbf24;
      color: #000;
      font-weight: bold;
      border-radius: 2px;
      padding: 0 2px;
    }
    
    input[type="text"], input[type="number"] {
      font-size: 16px;
    }
    textarea {
      font-size: 16px;
    }

    .tag-btn {
      transition: all 0.2s ease;
    }
    .tag-btn.active {
      background-color: #10b981 !important;
      border-color: #059669 !important;
      color: white;
    }

    /* 가상 스크롤링 최적화 */
    .virtual-list {
      height: 420px;
      overflow-y: auto;
      position: relative;
    }

    .virtual-item {
      transform: translateZ(0); /* GPU 가속 */
      will-change: transform;
    }

    /* 스크롤 최적화 */
    .scroll-optimized {
      contain: layout style paint;
      transform: translateZ(0);
    }
  </style>
</head>
<body class="min-h-screen bg-neutral-950 text-neutral-100">
  <main class="max-w-5xl mx-auto py-6 px-4">
    <section class="grid grid-cols-1 gap-3 mb-4">
      <div class="flex items-center gap-3 flex-wrap">
        <label class="rounded-2xl px-3 py-2 bg-neutral-800 hover:bg-neutral-700 border border-neutral-700 cursor-pointer select-none">
          파일 업로드
          <input id="file-input" type="file" accept=".xlsx,.xls" class="hidden" />
        </label>
        <button id="reset-btn" class="rounded-2xl px-3 py-2 bg-neutral-900 hover:bg-neutral-800 border border-neutral-700">
          데이터 초기화
        </button>
        <button id="delete-all-devices-btn"
                class="rounded-2xl px-3 py-2 bg-red-700 hover:bg-red-600 border border-red-600"
                title="등록된 모든 기기를 삭제합니다. 되돌릴 수 없습니다.">
          등록된 기기 전체 삭제
        </button>
        <span id="file-info" class="text-xs text-neutral-400">엑셀(.xlsx, .xls) 파일을 업로드하세요.</span>
      </div>

      <div id="dropzone" class="dropzone px-4 py-6 text-sm text-neutral-400">
        파일을 이 영역으로 드래그&드롭하거나, 상단의 파일 업로드 버튼을 사용하세요.
      </div>

      <div class="panel p-4">
        <div class="flex items-center justify-between gap-3 flex-wrap">
          <div class="flex items-center gap-2">
            <h3 class="font-semibold">기기(일련번호) 관리</h3>
          </div>
          <div class="flex items-center gap-2">
            <span class="text-xs text-neutral-400">활성 기기: </span>
            <span id="active-device-label" class="text-xs text-indigo-300">없음</span>
          </div>
        </div>

        <div class="mt-3 flex items-center gap-2 flex-wrap">
          <input id="device-input" type="text" 
                 class="rounded-xl px-3 py-2 bg-neutral-900 border border-neutral-700 w-64"
                 placeholder="일련번호(예: 609024, 628564)" 
                 inputmode="numeric" />
          <button id="device-add-btn" class="btn bg-neutral-800 hover:bg-neutral-700 border border-neutral-700">추가</button>
          <span class="text-xs text-neutral-500">쉼표/공백으로 여러 개 입력 가능. 끝의 마침표/쉼표는 자동 제거됩니다.</span>
        </div>

        <div id="device-chips" class="flex flex-wrap gap-2 mt-2"></div>

        <div class="mt-3 flex items-center gap-2 flex-wrap">
          <button id="copy-all-log-btn" class="btn bg-indigo-600 hover:bg-indigo-500">
            <span id="copy-all-log-btn-text">전체 로그 복사</span>
          </button>
          <button id="xlsx-all-btn" class="btn bg-orange-600 hover:bg-orange-500">
            <span id="xlsx-all-btn-text">전체 기기 XLSX 출력</span>
          </button>
          <button id="share-xlsx-btn" class="btn bg-purple-600 hover:bg-purple-500">
            <span id="share-xlsx-btn-text">XLSX 파일 공유</span>
          </button>
        </div>

        <div class="mt-3 flex items-center gap-3">
          <span class="text-sm text-neutral-300">부품 사용 상태</span>
          <div class="seg inline-flex">
            <button id="usage-used" class="text-sm">부품 사용</button>
            <button id="usage-unused" class="text-sm" title="선택된 부품이 있으면 비활성화됩니다">장력조정</button>
          </div>
        </div>

        <!-- 태그 섹션 -->
        <div class="mt-3">
          <div class="flex items-center justify-between gap-2 mb-2">
            <span class="text-sm text-neutral-300">XLSX 메모 태그</span>
            <div class="flex items-center gap-2">
              <button id="add-tag-btn" class="text-xs px-2 py-1 bg-blue-600 hover:bg-blue-500 rounded-lg border" title="새 태그 추가">
                + 태그 추가
              </button>
              <button id="manage-tags-btn" class="text-xs px-2 py-1 bg-gray-600 hover:bg-gray-500 rounded-lg border" title="태그 관리">
                태그 관리
              </button>
            </div>
          </div>
          <div id="custom-tags-container" class="flex flex-wrap gap-2 min-h-[32px]"></div>
        </div>

        <!-- 기기 고장증상 섹션 -->
        <div class="mt-3">
          <div class="flex items-center justify-between gap-2 mb-2">
            <span class="text-sm text-neutral-300">기기 고장증상</span>
            <span id="symptom-counter" class="text-xs text-neutral-400">0/290 바이트</span>
          </div>
          <textarea id="symptom-input" 
                    class="w-full h-20 rounded-xl px-3 py-2 bg-neutral-900 border border-neutral-700 resize-none focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="예: 에러코드 E01, 무동력, 브레이크 잠김 등..."
                    disabled></textarea>
        </div>

        <!-- 태그 입력 모달 -->
        <div id="tag-input-modal" class="hidden mt-3 p-3 border border-neutral-600 rounded-xl bg-neutral-900">
          <div class="flex items-center gap-2">
            <input id="tag-input" type="text" placeholder="새 태그 입력 (예: 봉유격)" 
                   class="flex-1 rounded-lg px-3 py-2 bg-neutral-800 border border-neutral-600 focus:outline-none focus:ring-2 focus:ring-blue-500" />
            <button id="tag-save-btn" class="px-3 py-2 bg-blue-600 hover:bg-blue-500 rounded-lg">추가</button>
            <button id="tag-cancel-btn" class="px-3 py-2 bg-gray-600 hover:bg-gray-500 rounded-lg">취소</button>
          </div>
        </div>

        <!-- 태그 관리 모달 -->
        <div id="tag-manage-modal" class="hidden mt-3 p-3 border border-neutral-600 rounded-xl bg-neutral-900">
          <div class="mb-3">
            <h4 class="text-sm font-semibold mb-2">태그 관리</h4>
            <div id="manage-tags-list" class="space-y-2"></div>
          </div>
          <button id="tag-manage-close-btn" class="px-3 py-2 bg-gray-600 hover:bg-gray-500 rounded-lg">닫기</button>
        </div>
      </div>

      <div id="mapping-panel" class="panel p-4 hidden">
        <div class="flex items-center justify-between">
          <h3 class="font-semibold">열 매핑 설정</h3>
          <span id="mapping-hint" class="text-xs text-neutral-400"></span>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mt-3">
          <div>
            <label class="text-sm text-neutral-300">태그 열</label>
            <select id="map-tag-col" class="w-full mt-1 rounded-xl px-3 py-2 bg-neutral-900 border border-neutral-700"></select>
          </div>
          <div>
            <label class="text-sm text-neutral-300">부품명 열</label>
            <select id="map-name-col" class="w-full mt-1 rounded-xl px-3 py-2 bg-neutral-900 border border-neutral-700"></select>
          </div>
          <div class="flex items-end">
            <label class="inline-flex items-center gap-2 mt-6">
              <input id="map-has-header" type="checkbox" class="h-5 w-5 accent-indigo-500" />
              <span class="text-sm">첫 행은 헤더</span>
            </label>
          </div>
        </div>
        <div class="mt-3">
          <div class="text-sm text-neutral-400 mb-1">미리보기(최대 10행)</div>
          <div id="map-preview" class="text-sm bg-neutral-900 border border-neutral-800 rounded-xl p-3 max-h-40 overflow-auto"></div>
        </div>
        <div class="flex items-center gap-2 mt-3">
          <button id="map-apply" class="rounded-2xl px-4 py-2 bg-indigo-600 hover:bg-indigo-500">적용하기</button>
          <button id="map-cancel" class="rounded-2xl px-4 py-2 bg-neutral-800 hover:bg-neutral-700 border border-neutral-700">취소</button>
        </div>
      </div>

      <div id="category-bar" class="flex items-center gap-2 overflow-x-auto custom-scroll mt-2"></div>
      <div id="status" class="text-xs text-neutral-400"></div>
    </section>

    <section class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="bg-neutral-900 border border-neutral-800 rounded-2xl p-3 md:p-4 shadow-lg scroll-optimized">
        <div class="flex items-center justify-between mb-3">
          <h2 class="text-lg font-semibold">
            부품 리스트 <span id="count" class="text-neutral-400"></span>
          </h2>
          <button id="clear-btn" class="btn bg-neutral-800 hover:bg-neutral-700 border border-neutral-700">
            모두 지우기
          </button>
        </div>
        <div class="mb-3">
          <input id="search" type="text" 
                 placeholder="부품 검색... (초성 검색 가능: ㅂㄹㅌ → 볼트)"
                 class="w-full rounded-2xl px-4 py-2 bg-neutral-900 border border-neutral-800 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
          <div id="search-info" class="text-xs text-neutral-500 mt-1"></div>
        </div>
        <div id="list" class="virtual-list custom-scroll"></div>
      </div>

      <div class="bg-neutral-900 border border-neutral-800 rounded-2xl p-3 md:p-4 shadow-lg flex flex-col scroll-optimized">
        <div class="flex items-center justify-between mb-3">
          <h2 class="text-lg font-semibold">선택된 항목(현재 기기 메모)</h2>
          <span id="active-device-mini" class="text-xs text-neutral-400"></span>
        </div>
        <div id="selected-chips" class="flex flex-wrap gap-2 mb-4 min-h-[42px]"></div>
        <div>
          <textarea id="output" readonly 
                    class="w-full h-32 mt-1 rounded-xl px-3 py-2 bg-black/60 border border-neutral-800 font-mono text-sm focus:outline-none"
                    placeholder="선택된 부품들이 여기에 표시됩니다..."></textarea>
          <div class="flex items-center gap-2 mt-2 flex-wrap">
            <button id="copy-btn" class="btn bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed">
              <span id="copy-btn-text">복사하기</span>
            </button>
          </div>
          <p class="mt-2 text-xs text-neutral-500">
            참고: 메모(현재 기기 출력)는 내부 공백이 제거됩니다. "장력조정" 선택 시 메모에는 "장력조정"이 표시됩니다.
          </p>
        </div>
      </div>
    </section>
  </main>

  <script>
    const CHOSUNG = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
    
    function getChosung(str) {
      return str.split('').map(char => {
        const code = char.charCodeAt(0);
        if (code >= 44032 && code <= 55203) {
          const base = code - 44032;
          const choIdx = Math.floor(base / 588);
          return CHOSUNG[choIdx];
        }
        return char;
      }).join('');
    }
    
    function matchesChosung(text, query) {
      const textChosungNoSpace = getChosung(text.replace(/\s+/g, ''));
      const textChosung = getChosung(text);
      const queryNoSpace = query.replace(/\s+/g, '');
      
      return textChosungNoSpace.includes(queryNoSpace) || 
             textChosung.includes(query) ||
             textChosungNoSpace.includes(query) ||
             textChosung.includes(queryNoSpace);
    }

    function highlightText(text, query) {
      if (!query.trim()) return text;
      
      const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
      return text.replace(regex, '<span class="highlight">$1</span>');
    }

    function getCurrentTimestamp() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');
      const hour = String(now.getHours()).padStart(2, '0');
      const min = String(now.getMinutes()).padStart(2, '0');
      const sec = String(now.getSeconds()).padStart(2, '0');
      
      return `${year}-${month}-${day}_${hour}-${min}-${sec}`;
    }

    function getCurrentDate() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');
      
      return `${year}-${month}-${day}`;
    }

    // 바이트 계산 함수 (한글 3바이트, 영문 1바이트)
    function getByteLength(str) {
      let byteLength = 0;
      for (let i = 0; i < str.length; i++) {
        const char = str.charCodeAt(i);
        if (char >= 0 && char <= 127) {
          byteLength += 1;
        } else {
          byteLength += 3;
        }
      }
      return byteLength;
    }

    // 최적화: 렌더링 배치 처리
    let renderScheduled = false;
    let renderQueue = new Set();

    function scheduleRender(renderType = 'all') {
      renderQueue.add(renderType);
      if (renderScheduled) return;
      renderScheduled = true;
      requestAnimationFrame(() => {
        performRender();
        renderQueue.clear();
        renderScheduled = false;
      });
    }

    function performRender() {
      if (renderQueue.has('all') || renderQueue.size > 3) {
        renderAll();
      } else {
        renderQueue.forEach(type => {
          switch(type) {
            case 'devices': renderDevices(); break;
            case 'list': renderList(); break;
            case 'chips': renderSelectedChips(); break;
            case 'output': renderOutput(); break;
            case 'tags': renderCustomTags(); break;
            case 'categories': renderCategoryBar(); break;
          }
        });
      }
    }

    function renderAll() {
      renderDevices();
      renderCategoryBar();
      renderList();
      renderSelectedChips();
      renderOutput();
      renderCustomTags();
    }

    // 최적화: saveState 디바운싱
    let saveTimeout;
    function debouncedSave() {
      clearTimeout(saveTimeout);
      saveTimeout = setTimeout(saveState, 300);
    }

    let lastGeneratedXLSX = null;

    function generateMemoWithLimit(entries, activeTags = []) {
      const maxByteLength = 290;
      let memoTokens = [];
      
      // 태그 프리픽스 생성
      let tagPrefix = '';
      if (activeTags.length > 0) {
        const sTags = activeTags.filter(t => t === 'S');
        const slashTags = activeTags.filter(t => t !== 'S');
        
        if (sTags.length > 0) {
          tagPrefix += '[S]';
        }
        if (slashTags.length > 0) {
          tagPrefix += slashTags.join(',') + '/';
        }
      }
      
      for (const [pid, qty] of entries) {
        const part = parts.find(x => x.id === pid);
        if (!part) continue;
        
        const base = part.name.replace(/\s+/g, "");
        const n = Number(qty) || 0;
        const token = n <= 1 ? base : `${base}${n}`;
        
        const testMemo = tagPrefix + [...memoTokens, token].join(",");
        
        if (getByteLength(testMemo) <= maxByteLength) {
          memoTokens.push(token);
        } else {
          break;
        }
      }
      
      let finalMemo = memoTokens.join(",");
      if (tagPrefix) {
        finalMemo = tagPrefix + finalMemo;
      }
      
      return finalMemo;
    }

    function generateRepairMemoWithLimit(symptom) {
      const maxByteLength = 290;
      if (!symptom) return '';
      
      if (getByteLength(symptom) <= maxByteLength) {
        return symptom;
      }
      
      // 290바이트 초과 시 잘라내기 (단어 경계에서)
      let result = '';
      let byteCount = 0;
      
      for (let i = 0; i < symptom.length; i++) {
        const char = symptom[i];
        const charBytes = char.charCodeAt(0) <= 127 ? 1 : 3;
        
        if (byteCount + charBytes > maxByteLength) {
          break;
        }
        
        result += char;
        byteCount += charBytes;
      }
      
      return result;
    }

    function generateAllDevicesXLSX() {
      if (!Array.isArray(devices) || devices.length === 0) {
        alert('출력할 기기가 없습니다.');
        return false;
      }

      const wsData = [];
      
      // 헤더: H열을 '정비내용'으로, J열을 '정비메모'로 변경
      wsData.push(['기기번호', '부품명(필수입력)', '', '수량', '', '', '', '정비내용', '', '정비메모']);
      
      const sorted = [...devices].sort((a,b) => {
        const na = Number(a.id), nb = Number(b.id);
        if (!Number.isNaN(na) && !Number.isNaN(nb)) return na - nb;
        return String(a.id).localeCompare(String(b.id), 'ko');
      });

      sorted.forEach((device, deviceIndex) => {
        if (!device) return;
        
        if (device.used === false) {
          const repairMemo = generateRepairMemoWithLimit(device.symptom || '');
          wsData.push([device.id, '장력조정', '', '', '', '', '', '', '', repairMemo]);
        } else {
          const entries = Object.entries(device.selected || {}).filter(([,q]) => Number(q) > 0);
          if (!entries.length) return;

          const memo = generateMemoWithLimit(entries, device.tags || []);
          const repairMemo = generateRepairMemoWithLimit(device.symptom || '');

          let isFirstPart = true;
          entries.forEach(([pid, qty]) => {
            const part = parts.find(x => x.id === pid);
            if (!part) return;
            
            const originalPartName = part.originalName || part.name;
            
            wsData.push([
              isFirstPart ? device.id : '',
              originalPartName,
              '',
              Number(qty),
              '', '', '',
              isFirstPart ? memo : '',
              '',
              isFirstPart ? repairMemo : ''
            ]);
            
            isFirstPart = false;
          });
        }
        
        // 각 기기 후 여백 행 추가 (마지막 기기 제외)
        if (deviceIndex < sorted.length - 1) {
          wsData.push(['', '', '', '', '', '', '', '', '', '']);
        }
      });

      if (wsData.length <= 1) {
        alert('출력할 데이터가 없습니다.');
        return false;
      }

      const ws = XLSX.utils.aoa_to_sheet(wsData);
      
      ws['!cols'] = [
        { width: 10 },  // A: 기기번호
        { width: 25 },  // B: 부품명
        { width: 5 },   // C: 공란
        { width: 8 },   // D: 수량
        { width: 5 },   // E: 공란
        { width: 5 },   // F: 공란
        { width: 5 },   // G: 공란
        { width: 20 },  // H: 정비내용
        { width: 5 },   // I: 공란
        { width: 25 }   // J: 정비메모
      ];

      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, '전체기기부품사용내역');

      lastGeneratedXLSX = wb;

      const timestamp = getCurrentTimestamp();
      const filename = `all_devices_${timestamp}.xlsx`;

      XLSX.writeFile(wb, filename);
      
      return true;
    }

    async function shareXLSXFile() {
      if (!lastGeneratedXLSX) {
        alert('먼저 XLSX 파일을 생성해주세요.');
        return false;
      }

      if (!navigator.share) {
        alert('이 브라우저는 공유 기능을 지원하지 않습니다.');
        return false;
      }

      try {
        const xlsxBuffer = XLSX.write(lastGeneratedXLSX, { bookType: 'xlsx', type: 'array' });
        const blob = new Blob([xlsxBuffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
        
        const timestamp = getCurrentTimestamp();
        const file = new File([blob], `all_devices_${timestamp}.xlsx`, { 
          type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' 
        });
        
        const currentDate = getCurrentDate();
        
        await navigator.share({
          title: '전체 기기 부품 사용내역',
          text: `/${currentDate}/부품 사용내역 입니다.`,
          files: [file]
        });
        return true;
      } catch (error) {
        console.error('XLSX 공유 실패:', error);
        alert('XLSX 파일 공유에 실패했습니다.');
        return false;
      }
    }

      if (window.XLSX) return true;
      return new Promise((resolve) => {
        const s = document.createElement('script');
        s.src = 'https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js';

    const STORAGE_KEY = 'parts-selector.v5';
    const COMMON_TAG = "공용";
    const NAME_HEADERS = ["name","part","partname","item","품명","이름","부품","부품명","품목","제품명"];
    const TAG_HEADERS  = ["category","cat","tag","tags","카테고리","분류","태그"];
    const TAG_GROUP_ALIASES = { 'pls': '킥보드', 'pl': '킥보드', 'b2': '자전거', 'b4': '자전거', '공용': '공용' };

    const $ = (sel) => document.querySelector(sel);
    const normKR = (s) => (s || "").normalize("NFKD").toLowerCase().replace(/\s+/g, "");
    const toTagKey = (t) => String(t || '').trim().toLowerCase().replace(/\./g, '');
    const mapTagToGroup = (tag) => TAG_GROUP_ALIASES[toTagKey(tag)] || tag;

    const setStatus = (msg, isError=false) => {
      const el = $("#status");
      el.textContent = msg || "";
      el.className = "text-xs " + (isError ? "text-red-400" : "text-neutral-400");
    };
    const colLetter = (i) => { let s = ""; i = Number(i); while (i >= 0) { s = String.fromCharCode((i % 26) + 65) + s; i = Math.floor(i / 26) - 1; } return s; };

    function stripBracketPrefix(raw) {
      const str = String(raw ?? "").trim();
      const m = str.match(/^\s*\[[^\]]+\]\s*(.*)$/);
      return m ? (m[1] || "").trim() : str;
    }
    function parseBracketed(raw) {
      const str = String(raw ?? "").trim();
      const m = str.match(/^\s*\[([^\]]+)\]\s*(.*)$/);
      if (m) {
        const category = (m[1] || "").trim() || "기타";
        const name = stripBracketPrefix(m[2] || "");
        return { category, name };
      }
      return null;
    }
    function splitTags(catString) {
      const raw = String(catString ?? "").trim();
      if (!raw) return ["기타"];
      const arr = raw.split("/").map(s => s.trim()).filter(Boolean);
      return Array.from(new Set(arr));
    }

    // 데이터
    let customTags = ["S", "봉유격", "홀가공", "오프라인"];
    let parts = [];
    let selected = {};          
    let activeCategory = null;  
    let query = "";
    let lastFileName = "";
    let lastSheetName = "";
    let mapState = { tagIdx: 0, nameIdx: 1, hasHeader: true };

    let devices = [];
    let activeDeviceId = null;

    // 가상 스크롤링 변수
    let filteredParts = [];
    let visibleStart = 0;
    let visibleEnd = 0;
    const ITEM_HEIGHT = 80; // 각 아이템 높이
    const BUFFER_SIZE = 10; // 버퍼 크기

    function saveState() {
      try {
        const payload = {
          v: 5,
          customTags,
          parts, selected, activeCategory, query,
          meta: { fileName: lastFileName, sheetName: lastSheetName, mapping: mapState },
          devices, activeDeviceId
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
      } catch (e) { console.warn("상태 저장 실패:", e); }
    }

    function loadState() {
      try {
        // v5 데이터 로드 시도
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const data = JSON.parse(raw);
          if (data && Array.isArray(data.parts)) {
            return loadV5Data(data);
          }
        }

        // v4 마이그레이션 시도
        const v4Raw = localStorage.getItem('parts-selector.v4');
        if (v4Raw) {
          const v4Data = JSON.parse(v4Raw);
          return migrateFromV4(v4Data);
        }

        // v3 마이그레이션 시도
        const v3Raw = localStorage.getItem('parts-selector.v3');
        if (v3Raw) {
          const v3Data = JSON.parse(v3Raw);
          return migrateFromV3(v3Data);
        }

        return false;
      } catch (e) {
        console.warn("상태 로드 실패:", e);
        return false;
      }
    }

    function loadV5Data(data) {
      customTags = Array.isArray(data.customTags) ? data.customTags : ["S", "봉유격", "홀가공", "오프라인"];
      
      parts = data.parts.map(p => {
        const tags = Array.isArray(p.tags) ? p.tags : ["기타"];
        const groupTags = Array.isArray(p.groupTags) && p.groupTags.length ? p.groupTags : tags.map(mapTagToGroup);
        return {
          id: p.id || `${(p.name||"")}||${tags.slice().sort().join('/')}`,
          tags,
          groupTags,
          name: stripBracketPrefix(p.name || ""),
          originalName: p.originalName || p.name || "",
          normName: p.normName || normKR(p.name || "")
        };
      });
      
      selected = data.selected || {};
      query = data.query || "";
      activeCategory = data.activeCategory || null;
      lastFileName = data.meta?.fileName || "";
      lastSheetName = data.meta?.sheetName || "";
      mapState = data.meta?.mapping || mapState;

      devices = Array.isArray(data.devices) ? data.devices.map(d => ({
        id: d.id,
        selected: d.selected || {},
        used: typeof d.used === 'boolean' ? d.used : true,
        tags: Array.isArray(d.tags) ? d.tags : [],
        symptom: d.symptom || ''
      })) : [];
      
      activeDeviceId = data.activeDeviceId || null;

      if (activeDeviceId) {
        const dev = devices.find(x => x.id === activeDeviceId);
        if (dev) selected = { ...dev.selected };
      }
      
      return true;
    }

    function migrateFromV4(data) {
      customTags = Array.isArray(data.customTags) ? data.customTags : ["S", "봉유격", "홀가공", "오프라인"];
      parts = data.parts || [];
      selected = data.selected || {};
      query = data.query || "";
      activeCategory = data.activeCategory || null;
      lastFileName = data.meta?.fileName || "";
      lastSheetName = data.meta?.sheetName || "";
      mapState = data.meta?.mapping || mapState;
      
      devices = Array.isArray(data.devices) ? data.devices.map(d => ({
        id: d.id,
        selected: d.selected || {},
        used: typeof d.used === 'boolean' ? d.used : true,
        tags: Array.isArray(d.tags) ? d.tags : [],
        symptom: '' // v4에서는 symptom이 없었음
      })) : [];
      
      activeDeviceId = data.activeDeviceId || null;
      
      if (activeDeviceId) {
        const dev = devices.find(x => x.id === activeDeviceId);
        if (dev) selected = { ...dev.selected };
      }
      
      saveState(); // v5로 저장
      return true;
    }

    function migrateFromV3(data) {
      customTags = ["S", "봉유격", "홀가공", "오프라인"]; // 기본값
      parts = data.parts || [];
      selected = data.selected || {};
      query = data.query || "";
      activeCategory = data.activeCategory || null;
      lastFileName = data.meta?.fileName || "";
      lastSheetName = data.meta?.sheetName || "";
      mapState = data.meta?.mapping || mapState;
      
      devices = Array.isArray(data.devices) ? data.devices.map(d => ({
        id: d.id,
        selected: d.selected || {},
        used: typeof d.used === 'boolean' ? d.used : true,
        tags: d.sTag ? ["S"] : [], // sTag를 tags 배열로 변환
        symptom: ''
      })) : [];
      
      activeDeviceId = data.activeDeviceId || null;
      
      if (activeDeviceId) {
        const dev = devices.find(x => x.id === activeDeviceId);
        if (dev) selected = { ...dev.selected };
      }
      
      saveState(); // v5로 저장
      return true;
    }

    function updateFileInfo(text) {
      const el = $("#file-info");
      if (el) el.textContent = text || "";
    }

    function buildCategories() {
      const set = new Set();
      parts.forEach(p => {
        const gs = Array.isArray(p.groupTags) ? p.groupTags : (Array.isArray(p.tags) ? p.tags.map(mapTagToGroup) : []);
        gs.forEach(g => set.add(g));
      });
      return Array.from(set);
    }

    function getFiltered() {
      const qn = normKR(query);
      const isChosung = /^[ㄱ-ㅎ\s]+$/.test(query.trim());
      
      return parts.filter(p => {
        const gs = Array.isArray(p.groupTags) ? p.groupTags : (Array.isArray(p.tags) ? p.tags.map(mapTagToGroup) : []);
        const catOk = !activeCategory || gs.includes(activeCategory) || gs.includes(COMMON_TAG);
        
        let txtOk = true;
        if (query.trim()) {
          if (isChosung) {
            txtOk = matchesChosung(p.name, query.trim());
          } else {
            txtOk = p.normName.includes(qn);
          }
        }
        
        return catOk && txtOk;
      });
    }

    function sanitizeDeviceId(raw) {
      const s = String(raw || '').trim();
      return s.replace(/[.,;]+$/g, '');
    }
    
    function ensureDevice(id) {
      id = sanitizeDeviceId(id);
      if (!id) return null;
      let d = devices.find(x => x.id === id);
      if (!d) {
        d = { id, selected: {}, used: true, tags: [], symptom: '' };
        devices.push(d);
      }
      return d;
    }
    
    function switchActiveDevice(id) {
      if (activeDeviceId) {
        const prev = devices.find(x => x.id === activeDeviceId);
        if (prev) prev.selected = { ...selected };
      }
      activeDeviceId = id;
      const cur = devices.find(x => x.id === activeDeviceId);
      selected = cur ? { ...cur.selected } : {};
      
      // 고장증상 입력 업데이트
      updateSymptomInput();
      
      debouncedSave();
      scheduleRender('all');
    }
    
    function removeDevice(id) {
      const idx = devices.findIndex(x => x.id === id);
      if (idx >= 0) devices.splice(idx, 1);
      if (activeDeviceId === id) {
        activeDeviceId = null;
        selected = {};
        updateSymptomInput();
      }
      debouncedSave();
      scheduleRender('all');
    }
    
    function syncSelectedToActiveDevice() {
      if (!activeDeviceId) return;
      const cur = devices.find(x => x.id === activeDeviceId);
      if (!cur) return;
      cur.selected = { ...selected };
      debouncedSave();
      scheduleRender('devices');
    }

    function hasActiveSelection() {
      return Object.values(selected || {}).some(v => Number(v) > 0);
    }

    function updateUsageButtons() {
      const usedBtn = $("#usage-used");
      const unusedBtn = $("#usage-unused");
      const hasActive = !!activeDeviceId;
      const hasSel = hasActive && hasActiveSelection();

      usedBtn.disabled = !hasActive;
      unusedBtn.disabled = !hasActive || hasSel;

      [usedBtn, unusedBtn].forEach(b => {
        b.classList.toggle("opacity-50", b.disabled);
        b.classList.toggle("cursor-not-allowed", b.disabled);
      });

      if (!hasActive) {
        usedBtn.title = "활성 기기를 먼저 선택하세요.";
        unusedBtn.title = "활성 기기를 먼저 선택하세요.";
      } else if (hasSel) {
        usedBtn.title = "";
        unusedBtn.title = "선택된 부품이 있어 장력조정으로 전환할 수 없습니다.";
      } else {
        usedBtn.title = "";
        unusedBtn.title = "";
      }
    }

    function updateSymptomInput() {
      const symptomInput = $("#symptom-input");
      const counter = $("#symptom-counter");
      
      if (!activeDeviceId) {
        symptomInput.disabled = true;
        symptomInput.value = '';
        symptomInput.placeholder = '활성 기기를 먼저 선택하세요.';
        counter.textContent = '0/290 바이트';
      } else {
        symptomInput.disabled = false;
        const device = devices.find(x => x.id === activeDeviceId);
        symptomInput.value = device ? (device.symptom || '') : '';
        symptomInput.placeholder = '예: 에러코드 E01, 무동력, 브레이크 잠김 등...';
        updateSymptomCounter();
      }
    }

    function updateSymptomCounter() {
      const symptomInput = $("#symptom-input");
      const counter = $("#symptom-counter");
      const text = symptomInput.value || '';
      const byteLength = getByteLength(text);
      
      counter.textContent = `${byteLength}/290 바이트`;
      
      if (byteLength > 290) {
        counter.classList.add('text-red-400');
        counter.classList.remove('text-neutral-400');
      } else {
        counter.classList.add('text-neutral-400');
        counter.classList.remove('text-red-400');
      }
    }

    function saveSymptom() {
      if (!activeDeviceId) return;
      const device = devices.find(x => x.id === activeDeviceId);
      if (!device) return;
      
      device.symptom = $("#symptom-input").value || '';
      debouncedSave();
    }

    // 최적화된 렌더링 함수들
    function renderCustomTags() {
      const container = $("#custom-tags-container");
      
      if (!activeDeviceId) {
        container.innerHTML = '<span class="text-neutral-500 text-sm">활성 기기를 선택하세요.</span>';
        return;
      }
      
      const currentDevice = devices.find(x => x.id === activeDeviceId);
      if (!currentDevice) return;
      
      // DOM Fragment 사용으로 최적화
      const fragment = document.createDocumentFragment();
      
      customTags.forEach(tag => {
        const isActive = currentDevice.tags && currentDevice.tags.includes(tag);
        const btn = document.createElement("button");
        btn.className = `tag-btn rounded-full px-3 py-1 text-sm border ${
          isActive ? 'active' : 'bg-neutral-900 border-neutral-700 hover:bg-neutral-800'
        }`;
        btn.textContent = `[${tag}]`;
        btn.title = `${tag} 태그 ${isActive ? '비활성화' : '활성화'}`;
        btn.addEventListener("click", () => toggleTag(tag));
        fragment.appendChild(btn);
      });
      
      container.innerHTML = '';
      container.appendChild(fragment);
    }

    function toggleTag(tagName) {
      if (!activeDeviceId) return;
      const device = devices.find(x => x.id === activeDeviceId);
      if (!device) return;
      
      if (!device.tags) device.tags = [];
      
      const index = device.tags.indexOf(tagName);
      if (index > -1) {
        device.tags.splice(index, 1);
      } else {
        device.tags.push(tagName);
      }
      
      debouncedSave();
      scheduleRender('devices');
      scheduleRender('tags');
    }

    function addCustomTag() {
      const input = $("#tag-input");
      const tagName = input.value.trim();
      
      if (!tagName) {
        alert("태그 이름을 입력해주세요.");
        return;
      }
      
      if (customTags.includes(tagName)) {
        alert("이미 존재하는 태그입니다.");
        return;
      }
      
      customTags.push(tagName);
      input.value = "";
      hideTagInputModal();
      debouncedSave();
      scheduleRender('tags');
      renderTagManageList();
    }

    function removeCustomTag(tagName) {
      if (!confirm(`"${tagName}" 태그를 삭제하시겠습니까?\n모든 기기에서 이 태그가 제거됩니다.`)) {
        return;
      }
      
      const index = customTags.indexOf(tagName);
      if (index > -1) {
        customTags.splice(index, 1);
      }
      
      devices.forEach(device => {
        if (device.tags) {
          const tagIndex = device.tags.indexOf(tagName);
          if (tagIndex > -1) {
            device.tags.splice(tagIndex, 1);
          }
        }
      });
      
      debouncedSave();
      scheduleRender('tags');
      scheduleRender('devices');
      renderTagManageList();
    }

    function showTagInputModal() {
      $("#tag-input-modal").classList.remove("hidden");
      $("#tag-input").focus();
    }

    function hideTagInputModal() {
      $("#tag-input-modal").classList.add("hidden");
      $("#tag-input").value = "";
    }

    function showTagManageModal() {
      $("#tag-manage-modal").classList.remove("hidden");
      renderTagManageList();
    }

    function hideTagManageModal() {
      $("#tag-manage-modal").classList.add("hidden");
    }

    function renderTagManageList() {
      const list = $("#manage-tags-list");
      const fragment = document.createDocumentFragment();
      
      customTags.forEach(tag => {
        const item = document.createElement("div");
        item.className = "flex items-center justify-between gap-2 p-2 border border-neutral-700 rounded-lg";
        
        const tagLabel = document.createElement("span");
        tagLabel.className = "text-sm";
        tagLabel.textContent = `[${tag}]`;
        
        const deleteBtn = document.createElement("button");
        deleteBtn.className = "text-xs px-2 py-1 bg-red-600 hover:bg-red-500 rounded-lg text-white";
        deleteBtn.textContent = "삭제";
        deleteBtn.addEventListener("click", () => removeCustomTag(tag));
        
        item.append(tagLabel, deleteBtn);
        fragment.appendChild(item);
      });
      
      if (customTags.length === 0) {
        const emptyMsg = document.createElement("div");
        emptyMsg.className = "text-neutral-500 text-sm text-center py-4";
        emptyMsg.textContent = "등록된 커스텀 태그가 없습니다.";
        fragment.appendChild(emptyMsg);
      }
      
      list.innerHTML = '';
      list.appendChild(fragment);
    }

    function renderDevices() {
      const chips = $("#device-chips");
      const label = $("#active-device-label");
      const mini = $("#active-device-mini");
      
      label.textContent = activeDeviceId || "없음";
      mini.textContent = activeDeviceId ? `기기: ${activeDeviceId}` : "";

      const fragment = document.createDocumentFragment();
      
      if (!devices.length) {
        const span = document.createElement("span");
        span.className = "text-neutral-500 text-sm";
        span.textContent = "일련번호를 추가하세요.";
        fragment.appendChild(span);
      } else {
        const sorted = [...devices].sort((a,b)=>{
          const na = Number(a.id), nb = Number(b.id);
          if (!Number.isNaN(na) && !Number.isNaN(nb)) return na - nb;
          return String(a.id).localeCompare(String(b.id), 'ko');
        });
        
        sorted.forEach(d=>{
          const count = Object.values(d.selected || {}).reduce((s,v)=> s + (Number(v)||0), 0);
          const isActive = activeDeviceId === d.id;
          const wrap = document.createElement("div");
          wrap.className = `flex items-center gap-1 rounded-full px-2 py-1 border ${isActive ? "bg-indigo-600 border-indigo-500" : "bg-neutral-900 border-neutral-700"}`;

          const btn = document.createElement("button");
          btn.className = "px-2";
          let displayText = count ? `${d.id}(${count})` : d.id;
          if (d.tags && d.tags.length > 0) {
            const tagPrefix = d.tags.map(t => `[${t}]`).join('');
            displayText = `${tagPrefix}${displayText}`;
          }
          btn.textContent = displayText;
          
          const tooltipParts = [d.used ? "부품 사용" : "장력조정"];
          if (d.tags && d.tags.length > 0) {
            tooltipParts.push(`태그: ${d.tags.join(', ')}`);
          }
          if (d.symptom) {
            tooltipParts.push(`고장증상: ${d.symptom.substring(0, 50)}${d.symptom.length > 50 ? '...' : ''}`);
          }
          btn.title = tooltipParts.join(' • ');
          
          btn.addEventListener("click", ()=> switchActiveDevice(d.id));

          const del = document.createElement("button");
          del.className = "rounded-full px-2 hover:bg-neutral-800";
          del.textContent = "✕";
          del.title = "삭제";
          del.addEventListener("click", ()=> removeDevice(d.id));

          wrap.append(btn, del);
          fragment.appendChild(wrap);
        });
      }
      
      chips.innerHTML = '';
      chips.appendChild(fragment);

      const usedBtn = $("#usage-used");
      const unusedBtn = $("#usage-unused");
      usedBtn.classList.remove("active");
      unusedBtn.classList.remove("active");
      if (activeDeviceId) {
        const cur = devices.find(x => x.id === activeDeviceId);
        if (cur && cur.used) usedBtn.classList.add("active");
        else unusedBtn.classList.add("active");
      }
      updateUsageButtons();
    }

    function renderCategoryBar() {
      const bar = $("#category-bar");
      if (parts.length === 0) {
        bar.innerHTML = '';
        return;
      }

      const cats = buildCategories();
      const fragment = document.createDocumentFragment();
      
      cats.forEach(cat => {
        const isActive = activeCategory === cat;
        const btn = document.createElement("button");
        btn.textContent = cat;
        btn.className = `rounded-full px-3 py-1 border select-none ${isActive ? "bg-indigo-600 border-indigo-500" : "bg-neutral-900 border-neutral-700 hover:bg-neutral-800"}`;
        btn.addEventListener("click", () => {
          activeCategory = (activeCategory === cat) ? null : cat;
          debouncedSave();
          scheduleRender('categories');
          scheduleRender('list');
        });
        fragment.appendChild(btn);
      });
      
      bar.innerHTML = '';
      bar.appendChild(fragment);
    }

    function liBaseClass(checked) {

      }

      // 가상 스크롤링: 보이는 영역만 렌더링
      const containerHeight = 420;
      const visibleCount = Math.ceil(containerHeight / ITEM_HEIGHT);
      const totalHeight = filteredParts.length * ITEM_HEIGHT;
      
      container.style.height = containerHeight + 'px';
      container.style.overflowY = 'auto';
      
      // 스크롤 이벤트 최적화
      let scrollTimeout;
      container.onscroll = () => {
        clearTimeout(scrollTimeout);

          updateVisibleItems();
        }, 16); // 60fps
      };
      
      updateVisibleItems();
    }

    function updateVisibleItems() {
      const container = $("#list");
      const scrollTop = container.scrollTop;
      
      const startIndex = Math.floor(scrollTop / ITEM_HEIGHT);
      const endIndex = Math.min(startIndex + Math.ceil(420 / ITEM_HEIGHT) + BUFFER_SIZE, filteredParts.length);
      
      visibleStart = Math.max(0, startIndex - BUFFER_SIZE);
      visibleEnd = endIndex;
      
      const fragment = document.createDocumentFragment();
      
      // 상단 패딩
      if (visibleStart > 0) {
        const topPadding = document.createElement('div');
        topPadding.style.height = (visibleStart * ITEM_HEIGHT) + 'px';
        fragment.appendChild(topPadding);
      }
      
      // 보이는 아이템들만 렌더링
      for (let i = visibleStart; i < visibleEnd; i++) {
        const p = filteredParts[i];
        if (!p) continue;
        
        const li = createPartElement(p);
        fragment.appendChild(li);
      }
      
      // 하단 패딩
      if (visibleEnd < filteredParts.length) {
        const bottomPadding = document.createElement('div');
        bottomPadding.style.height = ((filteredParts.length - visibleEnd) * ITEM_HEIGHT) + 'px';
        fragment.appendChild(bottomPadding);
      }
      
      container.innerHTML = '';
      container.appendChild(fragment);
    }

    function buildAllLogs() {
      if (!Array.isArray(devices) || devices.length === 0) return "";

      const sorted = [...devices].sort((a,b)=>{
        const na = Number(a.id), nb = Number(b.id);
        if (!Number.isNaN(na) && !Number.isNaN(nb)) return na - nb;
        return String(a.id).localeCompare(String(b.id), 'ko');
      });

      const lines = [];
      for (const d of sorted) {
        if (!d) continue;

        if (d.used === false) {
          lines.push(`${d.id} 장력조정`);
          continue;
        }

        const entries = Object.entries(d.selected || {}).filter(([,q]) => Number(q) > 0);
        if (!entries.length) continue;

        const tokens = [];
        for (const [pid, qty] of entries) {
          const p = parts.find(x => x.id === pid);
          if (!p) continue;
          const base = (p.name || "").replace(/\s+/g, "");
          const n = Number(qty) || 0;
          tokens.push(n <= 1 ? base : `${base}x${n}`);
        }
        if (tokens.length) lines.push(`${d.id} ${tokens.join(",")} 교체`);
      }

      return lines.join("\n");
    }

    function pickFirstNonEmptySheet(wb) {
      for (const name of wb.SheetNames) {
        const ws = wb.Sheets[name];
        const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "", raw: false });
        const hasData = Array.isArray(rows) && rows.some(r => Array.isArray(r) && r.some(c => String(c ?? "").trim() !== ""));
        if (hasData) return { ws, rows, sheetName: name };
      }
      return { ws: null, rows: [], sheetName: "" };
    }

    function suggestMapping(rows) {
      const header = (rows[0] || []).map(v => String(v ?? "").trim());
      const lower = header.map(v => v.toLowerCase());
      let tagIdx = -1, nameIdx = -1;
      for (let i = 0; i < lower.length; i++) {
        if (tagIdx === -1 && TAG_HEADERS.includes(lower[i])) tagIdx = i;
        if (nameIdx === -1 && NAME_HEADERS.includes(lower[i])) nameIdx = i;
      }
      let hasHeader = (tagIdx !== -1 || nameIdx !== -1);
      const colMax = Math.max(header.length, ...rows.slice(0, 200).map(r => Array.isArray(r) ? r.length : 0));
      if (tagIdx === -1 && nameIdx === -1 && colMax >= 2) {
        tagIdx = 0; nameIdx = 1; hasHeader = false;
      } else {
        if (tagIdx === -1 && nameIdx !== -1) tagIdx = (nameIdx === 0 ? 1 : 0);
        if (nameIdx === -1 && tagIdx !== -1) nameIdx = (tagIdx === 0 ? 1 : 0);
        if (tagIdx === nameIdx) {
          for (let i = 0; i < colMax; i++) { if (i !== tagIdx) { nameIdx = i; break; } }
        }
      }
      return { tagIdx, nameIdx, hasHeader, colMax };
    }

    function parseRows(rows, tagIdx, nameIdx, hasHeader) {
      const start = hasHeader ? 1 : 0;
      const parsed = [];
      let skipped = 0;
      for (let r = start; r < rows.length; r++) {
        const row = rows[r] || [];
        let cat = tagIdx >= 0 ? String(row[tagIdx] ?? "").trim() : "";
        let nameRaw = String(row[nameIdx] ?? "").trim();
        
        const originalName = nameRaw;
        
        if (!cat && !nameRaw) { skipped++; continue; }
        if (!cat) {
          const legacy = parseBracketed(nameRaw);
          if (legacy) { cat = legacy.category; nameRaw = legacy.name; }
        }
        const tags = splitTags(cat || "기타");
        const name = stripBracketPrefix(nameRaw);
        if (!name) { skipped++; continue; }
        const id = `${name}||${tags.slice().sort().join('/')}`;
        const groupTags = tags.map(mapTagToGroup);
        parsed.push({ 
          id, tags, groupTags, 
          name,
          originalName,
          normName: normKR(name) 
        });
      }
      return { parsed, skipped };
    }

    function bestEffortParse(rows) {
      const sugg = suggestMapping(rows);
      const colMax = Math.max(...rows.slice(0, 200).map(r => Array.isArray(r) ? r.length : 0), 0);
      const attempts = [];
      attempts.push({ tagIdx: sugg.tagIdx, nameIdx: sugg.nameIdx, hasHeader: sugg.hasHeader });
      if (colMax >= 2) {
        attempts.push({ tagIdx: 0, nameIdx: 1, hasHeader: true  });
        attempts.push({ tagIdx: 0, nameIdx: 1, hasHeader: false });
        attempts.push({ tagIdx: 1, nameIdx: 0, hasHeader: true  });
        attempts.push({ tagIdx: 1, nameIdx: 0, hasHeader: false });
      }
      if (colMax <= 1) {
        attempts.push({ tagIdx: -1, nameIdx: 0, hasHeader: true  });
        attempts.push({ tagIdx: -1, nameIdx: 0, hasHeader: false });
      }
      for (const a of attempts) {
        const { parsed } = parseRows(rows, a.tagIdx, a.nameIdx, a.hasHeader);
        if (parsed.length > 0) {
          return { parsed, mapping: a };
        }
      }
      return { parsed: [], mapping: null };
    }

    function showMappingPanel(rows, suggestion) {
      const panel = $("#mapping-panel");
      const tagSel = $("#map-tag-col");
      const nameSel = $("#map-name-col");
      const headerCb = $("#map-has-header");
      const preview = $("#map-preview");
      const hint = $("#mapping-hint");

      const colMax = Math.max((rows[0] || []).length, ...rows.slice(0, 200).map(r => Array.isArray(r) ? r.length : 0));
      tagSel.innerHTML = "";
      nameSel.innerHTML = "";

      const noneOpt = document.createElement("option");
      noneOpt.value = "-1"; noneOpt.textContent = "없음(단일열/괄호 또는 기타)";
      tagSel.appendChild(noneOpt);

      for (let i = 0; i < colMax; i++) {
        const label = `${colLetter(i)}${(rows[0] && rows[0][i]) ? ` · ${String(rows[0][i]).trim()}` : ""}`;
        const t = document.createElement("option"); t.value = String(i); t.textContent = label; tagSel.appendChild(t);
        const n = document.createElement("option"); n.value = String(i); n.textContent = label; nameSel.appendChild(n);
      }

      tagSel.value = String(suggestion.tagIdx >= -1 ? suggestion.tagIdx : -1);
      nameSel.value = String(suggestion.nameIdx >= 0 ? suggestion.nameIdx : Math.min(1, colMax-1));
      headerCb.checked = !!suggestion.hasHeader;
      hint.textContent = `자동 제안: 태그=${suggestion.tagIdx>=0?colLetter(suggestion.tagIdx):'없음'}, 부품명=${colLetter(suggestion.nameIdx)}, 헤더=${suggestion.hasHeader ? "예" : "아니오"}`;

      const updatePreview = () => {
        const tIdx = Number(tagSel.value);
        const nIdx = Number(nameSel.value);
        const hasH = headerCb.checked;
        const start = hasH ? 1 : 0;
        const lines = [];
        for (let r = start; r < rows.length && lines.length < 10; r++) {
          const row = rows[r] || [];
          const cat = tIdx >= 0 ? String(row[tIdx] ?? "").trim() : "";
          const nmRaw = String(row[nIdx] ?? "").trim();
          const legacy = !cat ? parseBracketed(nmRaw) : null;
          const tags = splitTags(legacy ? legacy.category : (cat || "기타"));
          const nm = stripBracketPrefix(legacy ? legacy.name : nmRaw);
          if (!nm && !cat) continue;
          lines.push(`[${tags.join('/')}] ${nm}`);
        }
        preview.textContent = lines.length ? lines.join("\n") : "(데이터 미리보기 없음)";
        mapState = { tagIdx: tIdx, nameIdx: nIdx, hasHeader: hasH };
      };
      
      [tagSel, nameSel, headerCb].forEach(el => el.addEventListener('change', updatePreview));
      updatePreview();

      $("#map-apply").onclick = () => {
        const { parsed, skipped } = (function(){
          const start = headerCb.checked ? 1 : 0;
          return parseRows(rows, Number(tagSel.value), Number(nameSel.value), headerCb.checked);
        })();
        if (parsed.length === 0) { alert("파싱 결과가 0건입니다. 열 선택과 헤더 여부를 다시 확인해주세요."); return; }
        parts = parsed;
        selected = {};
        activeCategory = null;
        query = "";
        $("#search").value = "";
        debouncedSave();
        scheduleRender('all');
        setStatus(`매핑 적용: 태그=${mapState.tagIdx>=0?colLetter(mapState.tagIdx):'없음'}, 부품명=${colLetter(mapState.nameIdx)}, 헤더=${mapState.hasHeader ? "예" : "아니오"} | 총 ${parts.length}건`, false);
        panel.classList.add("hidden");
      };

      $("#map-cancel").onclick = () => {
        panel.classList.add("hidden");
      };

      panel.classList.remove("hidden");
    }

    async function processFile(file) {
      setStatus("");
      const ext = (file.name.split(".").pop() || "").toLowerCase();
      if (!["xlsx", "xls"].includes(ext)) {
        setStatus("엑셀 파일만 업로드 가능합니다. (.xlsx, .xls)", true);
        alert("엑셀 파일만 업로드 가능합니다. (.xlsx, .xls)");
        return;
      }

      const ok = await ensureXLSX();
      if (!ok) {
        setStatus("XLSX 라이브러리를 불러오지 못했습니다. 네트워크/정책 이슈일 수 있습니다.", true);
        alert("XLSX 라이브러리를 불러오지 못했습니다.");
        return;
      }

      const reader = new FileReader();
      reader.onload = () => {
        try {
          const wb = XLSX.read(new Uint8Array(reader.result), { type: "array" });
          const chosen = pickFirstNonEmptySheet(wb);
          if (!chosen.ws) throw new Error("모든 시트가 비어 있음");
          const rows = chosen.rows;
          lastSheetName = chosen.sheetName;

          const { parsed, mapping } = bestEffortParse(rows);

          lastFileName = file.name;
          updateFileInfo(`${file.name} • ${lastSheetName} 로드됨`);

          if (parsed.length > 0) {
            parts = parsed;
            selected = {};
            activeCategory = null;
            query = "";
            $("#search").value = "";
            if (mapping) mapState = mapping;
            debouncedSave();
            scheduleRender('all');
            setStatus(`자동 매핑 성공: 태그=${mapState.tagIdx>=0?colLetter(mapState.tagIdx):'없음'}, 부품명=${colLetter(mapState.nameIdx)}, 헤더=${mapState.hasHeader ? "예" : "아니오"} | 총 ${parts.length}건`, false);
            $("#mapping-panel").classList.add("hidden");
          } else {
            setStatus("자동 매핑을 수행하지 못했습니다. 상단의 '열 매핑 설정'에서 열을 선택해 주세요.", true);
            const sug = suggestMapping(rows);
            showMappingPanel(rows, sug);
          }
        } catch (err) {
          console.error(err);
          setStatus("파일을 읽는 중 문제가 발생했습니다. 파일 형식/시트/헤더를 확인하세요.", true);
          alert("파일을 읽는 중 문제가 발생했습니다. 지원 형식: .xlsx / .xls");
        }
      };
      reader.onerror = () => {
        setStatus("파일을 읽지 못했습니다. 파일 접근 권한 또는 손상 여부를 확인하세요.", true);
        alert("파일을 읽지 못했습니다.");
      };
      reader.readAsArrayBuffer(file);
    }

      saveSymptom();
    });

    // 태그 관련 이벤트
    $("#add-tag-btn").addEventListener("click", showTagInputModal);
    $("#manage-tags-btn").addEventListener("click", showTagManageModal);
    $("#tag-save-btn").addEventListener("click", addCustomTag);
    $("#tag-cancel-btn").addEventListener("click", hideTagInputModal);
    $("#tag-manage-close-btn").addEventListener("click", hideTagManageModal);
    
    $("#tag-input").addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        addCustomTag();
      } else if (e.key === "Escape") {
        hideTagInputModal();
      }
    });

    $("#copy-all-log-btn").addEventListener("click", copyAllLogs);
    
    $("#xlsx-all-btn").addEventListener("click", async () => {
      const success = generateAllDevicesXLSX();
      if (success) {
        showXLSXSuccess($("#xlsx-all-btn"), $("#xlsx-all-btn-text"));
      }
    });
    
    $("#share-xlsx-btn").addEventListener("click", async () => {
      const success = await shareXLSXFile();
      if (success) {
        showShareSuccess($("#share-xlsx-btn"), $("#share-xlsx-btn-text"));
      }
    });
    
    $("#delete-all-devices-btn").addEventListener("click", deleteAllDevices);

    // 검색 입력 최적화 (디바운싱)
    let searchTimeout;
    $("#search").addEventListener("input", (e) => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        query = e.target.value || "";
        debouncedSave();
        scheduleRender('list');
      }, 200); // 200ms 디바운싱
    });

    $("#clear-btn").addEventListener("click", () => {
      selected = {};
      syncSelectedToActiveDevice();
      scheduleRender('list');
      scheduleRender('chips');
      scheduleRender('output');
    });

    $("#reset-btn").addEventListener("click", () => {
      if (!confirm("저장된 데이터(부품 목록, 선택, 기기/사용상태, 검색/태그/매핑)를 모두 삭제할까요?")) return;
      parts = [];
      selected = {};
      activeCategory = null;
      query = "";
      lastFileName = "";
      lastSheetName = "";
      mapState = { tagIdx: 0, nameIdx: 1, hasHeader: true };
      devices = [];
      activeDeviceId = null;
      customTags = ["S", "봉유격", "홀가공", "오프라인"];
      $("#search").value = "";
      localStorage.removeItem(STORAGE_KEY);
      updateFileInfo("엑셀(.xlsx, .xls) 파일을 업로드하세요.");
      setStatus("");
      updateSymptomInput();
      scheduleRender('all');
      $("#mapping-panel").classList.add("hidden");
    });

    $("#copy-btn").addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText($("#output").value);
        showCopySuccess($("#copy-btn"), $("#copy-btn-text"));
      } catch (e) {
        alert("복사에 실패했어요. 수동으로 복사해 주세요.");
      }
    });

    // 드래그&드롭 이벤트
    const dz = $("#dropzone");
    ["dragenter", "dragover", "dragleave", "drop"].forEach(evt =>
      dz.addEventListener(evt, e => { e.preventDefault(); e.stopPropagation(); })
    );
    ["dragenter", "dragover"].forEach(evt =>
      dz.addEventListener(evt, () => dz.classList.add("dragover"))
    );
    ["dragleave", "drop"].forEach(evt =>
      dz.addEventListener(evt, () => dz.classList.remove("dragover"))
    );
    dz.addEventListener("drop", (e) => {
      const file = e.dataTransfer.files && e.dataTransfer.files[0];
      if (file) processFile(file);
    });

    $("#file-input").addEventListener("change", (e) => {
      const file = e.target.files && e.target.files[0]; 
      if (!file) return;
      processFile(file);
      e.target.value = "";
    });

    // 초기화 및 첫 렌더링
    const restored = loadState();
    if (restored) {
      const more = lastSheetName ? ` • ${lastSheetName}` : "";
      updateFileInfo(`${lastFileName ? `${lastFileName}${more} (저장됨)` : "저장된 데이터"} • 총 ${parts.length}건`);
      $("#search").value = query || "";
    }
    
    updateSymptomInput();
    scheduleRender('all');

    // XLSX 라이브러리 체크
    (async () => {
      if (!(await ensureXLSX())) {
        setStatus("경고: XLSX 라이브러리를 불러오지 못했습니다. 네트워크/정책 차단 가능성.", true);
      }
    })();
  </script>
</body>
</html>
